name: Build SGN Map Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/raw/**"
      - "tools/extract_project.py"
      - ".github/workflows/extract-arcgis.yml"

permissions:
  contents: write

jobs:
  build-map-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install GIS tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin python3-gdal p7zip-full

          python3 - <<'PY'
          from osgeo import gdal, ogr
          print("GDAL:", gdal.VersionInfo())
          print("OpenFileGDB driver:", bool(ogr.GetDriverByName("OpenFileGDB")))
          print("FileGDB driver:", bool(ogr.GetDriverByName("FileGDB")))
          PY

      - name: Extract ArcGIS project packages
        run: |
          python3 tools/extract_project.py

      - name: Show generated files
        run: |
          echo "Generated files in data/map:"
          find data/map -maxdepth 2 -type f -print | sort || true

          echo "Raw files in data/raw:"
          find data/raw -maxdepth 1 -type f -print | sort || true

      - name: Commit generated map data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/map || true
          git add data/structures_polygons.geojson || true
          git add data/structures_points.geojson || true

          if git diff --cached --quiet; then
            echo "No generated map data changes to commit."
          else
            git commit -m "Build combined SGN map data"
            git push
          fi
