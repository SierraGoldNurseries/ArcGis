html <!doctype html> <html lang="en"> <head> <meta charset="utf-8" /> <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" /> <title>SGN Map App</title> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" /> <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" /> <style> :root{ --bg:#f6f8fb; --card:#ffffff; --text:#101827; --muted:#64748b; --line:#e5e7eb; --accent:#0891b2; --shadow:0 10px 35px rgba(15,23,42,.14); } *{box-sizing:border-box} html,body{ height:100%; margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); overflow:hidden; } #map{ position:fixed; inset:0; z-index:1; background:#dbe4ec; } .topbar{ position:fixed; left:0; right:0; top:0; height:64px; z-index:1000; display:flex; align-items:center; gap:12px; padding:10px 14px; background:rgba(255,255,255,.94); backdrop-filter:blur(10px); border-bottom:1px solid rgba(226,232,240,.8); } .menu-btn{ width:44px; height:44px; border:0; border-radius:14px; background:#fff; box-shadow:0 3px 14px rgba(15,23,42,.12); font-size:22px; font-weight:900; cursor:pointer; } .brand{ display:flex; align-items:center; gap:10px; min-width:0; } .logo{ width:42px; height:42px; border-radius:14px; display:grid; place-items:center; background:linear-gradient(135deg,#0e7490,#67e8f9); color:white; font-weight:900; letter-spacing:.5px; box-shadow:0 8px 18px rgba(8,145,178,.26); } .title{ font-size:18px; font-weight:950; line-height:1.05; white-space:nowrap; } .sub{ font-size:12px; color:#475569; font-weight:800; margin-top:2px; } .top-spacer{flex:1} .top-action{ border:0; background:linear-gradient(135deg,#0f766e,#5eead4); color:#fff; border-radius:16px; height:46px; padding:0 20px; font-size:15px; font-weight:950; cursor:pointer; box-shadow:0 8px 20px rgba(15,118,110,.22); } .side{ position:fixed; left:0; top:72px; bottom:0; width:370px; max-width:calc(100vw - 20px); z-index:900; background:rgba(255,255,255,.94); backdrop-filter:blur(10px); border-right:1px solid rgba(226,232,240,.9); border-top-right-radius:24px; box-shadow:var(--shadow); overflow:hidden; transition:transform .22s ease; } .side.collapsed{ transform:translateX(calc(-100% + 58px)); box-shadow:none; background:transparent; border-right:0; } .open-side{ position:absolute; left:12px; top:14px; width:42px; height:42px; border:0; border-radius:14px; background:#fff; box-shadow:0 6px 16px rgba(15,23,42,.18); font-weight:950; cursor:pointer; display:none; } .side.collapsed .open-side{display:block} .panel{ height:100%; padding:14px; overflow:auto; scrollbar-width:thin; } .side.collapsed .panel{display:none} .search-wrap{ position:relative; margin-bottom:10px; } .search{ width:100%; height:46px; border:1px solid #cbd5e1; border-radius:18px; background:#fff; padding:0 14px; font-size:15px; font-weight:850; outline:none; box-shadow:0 5px 18px rgba(15,23,42,.06); } .suggest{ display:none; position:absolute; top:52px; left:0; right:0; z-index:2000; background:#fff; border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 12px 28px rgba(15,23,42,.16); overflow:hidden; } .suggest.show{display:block} .sug{ padding:11px 13px; cursor:pointer; font-weight:900; border-bottom:1px solid #f1f5f9; } .sug small{ display:block; color:#64748b; font-weight:800; margin-top:2px; } .sug:hover{background:#f0f9ff} .btn-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; } .btn{ height:42px; border:1px solid #d8e0eb; border-radius:14px; background:#fff; font-weight:950; font-size:14px; cursor:pointer; color:#0f172a; box-shadow:0 4px 13px rgba(15,23,42,.05); } .btn.on{ background:#ecfeff; border-color:#67e8f9; color:#155e75; } .stats{ display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 12px; } .pill{ display:inline-flex; align-items:center; gap:7px; border:1px solid #e2e8f0; border-radius:999px; background:#fff; padding:7px 9px; font-size:12px; font-weight:900; color:#0f172a; margin:3px 3px 3px 0; } .pill small{ color:#475569; font-weight:950; } .dot{ width:11px; height:11px; border-radius:999px; display:inline-block; flex:0 0 auto; } .tabs{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; border-bottom:1px solid #e2e8f0; padding-bottom:10px; margin-bottom:10px; } .tab{ height:42px; border:1px solid #d8e0eb; border-radius:14px; background:#fff; font-weight:950; font-size:15px; cursor:pointer; } .tab.on{ background:#ecfeff; border-color:#bae6fd; color:#155e75; } .pane{display:none} .pane.on{display:block} .project{ background:#fff; border:1px solid #edf2f7; border-radius:16px; margin-bottom:10px; overflow:hidden; box-shadow:0 4px 14px rgba(15,23,42,.04); } .phead{ display:flex; align-items:center; gap:9px; padding:12px; cursor:pointer; } .sw{ width:16px; height:16px; border-radius:6px; flex:0 0 auto; } .pname{ flex:1; font-weight:950; font-size:15px; } .badge{ padding:4px 8px; background:#eef2ff; color:#334155; border-radius:999px; font-size:12px; font-weight:950; } .pactions{ display:grid; grid-template-columns:repeat(3,1fr); gap:7px; padding:0 10px 10px; } .pactions button{ border:1px solid #e2e8f0; background:#fff; border-radius:12px; height:34px; font-weight:950; cursor:pointer; } .pactions button.on{ background:#ecfeff; border-color:#67e8f9; color:#155e75; } .plist{ display:none; padding:0 12px 12px; } .project.open .plist{display:block} .layerrow{ display:flex; justify-content:space-between; align-items:center; gap:10px; color:#64748b; font-size:13px; font-weight:800; border-top:1px solid #f1f5f9; padding:7px 0; } .layerrow span{ display:flex; align-items:center; gap:7px; min-width:0; } .layerrow small{ color:#334155; font-weight:950; } .item{ display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid #f1f5f9; cursor:pointer; } .item:hover{background:#f8fafc} .item-control{ display:grid; grid-template-columns:1fr; gap:4px; flex:0 0 auto; width:62px; } .checkline{ display:flex; align-items:center; gap:5px; font-size:11px; font-weight:950; color:#334155; line-height:1; cursor:pointer; user-select:none; } .checkline input{ width:16px; height:16px; cursor:pointer; accent-color:#0891b2; margin:0; } .ib{ width:36px; height:36px; border-radius:12px; display:grid; place-items:center; color:#fff; font-size:11px; font-weight:950; flex:0 0 auto; } .it{ min-width:0; flex:1; } .it b{ display:block; font-size:15px; font-weight:950; color:#111827; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; } .it small{ display:block; margin-top:2px; font-size:12px; font-weight:850; color:#64748b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; } .note{ color:#64748b; font-size:14px; font-weight:800; padding:12px; } .tools{ display:grid; gap:10px; } .tool-card{ background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:12px; box-shadow:0 4px 12px rgba(15,23,42,.04); } .tool-card b{ display:block; margin-bottom:8px; } .drawer{ position:fixed; right:14px; top:82px; width:360px; max-width:calc(100vw - 28px); z-index:1100; background:#fff; border:1px solid #e2e8f0; border-radius:22px; box-shadow:var(--shadow); transform:translateX(calc(100% + 30px)); transition:transform .22s ease; overflow:hidden; } .drawer.open{transform:translateX(0)} .dhead{ display:flex; align-items:flex-start; gap:10px; padding:16px; border-bottom:1px solid #eef2f7; } .dtitle{ flex:1; min-width:0; } .dtitle b{ display:block; font-size:18px; font-weight:950; } .dtitle small{ color:#64748b; font-weight:850; } .xbtn{ width:34px; height:34px; border:0; background:#f8fafc; border-radius:12px; font-weight:950; cursor:pointer; } .dbody{ padding:14px 16px 16px; } .popup-grid, .detail-grid{ display:grid; grid-template-columns:88px 1fr; gap:7px 12px; font-size:13px; } .popup-grid b, .detail-grid b{ color:#475569; } .detail-actions{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:14px; } .detail-actions button{ height:40px; border:1px solid #d8e0eb; background:#fff; border-radius:13px; font-weight:950; cursor:pointer; } .toast{ position:fixed; left:50%; top:82px; transform:translateX(-50%) translateY(-8px); z-index:3000; background:#020617; color:#fff; padding:11px 16px; border-radius:16px; font-weight:950; box-shadow:0 12px 24px rgba(15,23,42,.22); opacity:0; pointer-events:none; transition:opacity .18s ease, transform .18s ease; max-width:calc(100vw - 30px); } .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); } .label{ display:inline-block; background:rgba(255,255,255,.84); color:#0f172a; border:2px solid rgba(255,255,255,.95); border-radius:999px; padding:1px 5px; font-size:12px; line-height:1.1; font-weight:950; white-space:nowrap; text-shadow:0 1px 1px rgba(255,255,255,.9); box-shadow:0 1px 5px rgba(15,23,42,.22); transform:translate(-50%,-50%); } .label.small{ font-size:11px; padding:1px 4px; } .label.tiny{ font-size:10px; padding:0 4px; } .locdot{ width:22px; height:22px; border-radius:50%; background:#0284c7; border:4px solid #fff; box-shadow:0 0 0 8px rgba(2,132,199,.22),0 4px 14px rgba(15,23,42,.3); } .leaflet-popup-content-wrapper{ border-radius:16px; } .leaflet-popup-content{ margin:13px 14px; font-family:inherit; } @media(max-width:720px){ .topbar{ height:62px; padding:8px; } .title{font-size:16px} .sub{font-size:11px} .top-action{ height:42px; padding:0 12px; font-size:13px; } .side{ top:72px; width:350px; } .drawer{ top:auto; left:10px; right:10px; bottom:12px; width:auto; transform:translateY(calc(100% + 24px)); } .drawer.open{transform:translateY(0)} } </style> </head> <body> <div id="map"></div> <header class="topbar"> <button id="panelToggle" class="menu-btn">☰</button> <div class="brand"> <div class="logo">SGN</div> <div> <div class="title">SGN Map App</div> <div id="sub" class="sub">Loading map data...</div> </div> </div> <div class="top-spacer"></div> <button class="top-action" onclick="location.href='import.html'">Admin / Import</button> </header> <aside id="side" class="side"> <button id="openSide" class="open-side">☰</button> <div class="panel"> <div class="search-wrap"> <input id="search" class="search" placeholder="Search location..." autocomplete="off" /> <div id="suggest" class="suggest"></div> </div> <div class="btn-grid"> <button id="satBtn" class="btn on">Satellite</button> <button id="streetBtn" class="btn">Street</button> <button id="polyBtn" class="btn on">Polygons</button> <button id="pointBtn" class="btn on">Points</button> <button id="allLabelsBtn" class="btn on">All labels</button> <button id="shortBtn" class="btn">Short labels</button> </div> <div class="stats"> <span id="featureStat" class="pill">0 features</span> <span id="shownStat" class="pill">0 shown</span> <span id="labelStat" class="pill">all labels</span> </div> <div class="tabs"> <button class="tab on" data-tab="projectsPane">Groups</button> <button class="tab" data-tab="listPane">List</button> <button class="tab" data-tab="toolsPane">Tools</button> </div> <section id="projectsPane" class="pane on"> <div id="projects"></div> </section> <section id="listPane" class="pane"> <div id="list"></div> </section> <section id="toolsPane" class="pane"> <div class="tools"> <div class="tool-card"> <b>Map tools</b> <div class="btn-grid"> <button id="fitBtn" class="btn">Fit all</button> <button id="gpsBtn" class="btn">GPS</button> <button id="copyBtn" class="btn">Copy view</button> <button id="clearBtn" class="btn">Clear search</button> </div> </div> <div class="tool-card"> <b>Color groups</b> <div id="pillbar"></div> </div> </div> </section> </div> </aside> <aside id="drawer" class="drawer"> <div class="dhead"> <div class="dtitle"> <b id="dTitle">Location</b> <small id="dSub"></small> </div> <button id="closeDrawer" class="xbtn">×</button> </div> <div class="dbody"> <div id="dDetails" class="detail-grid"></div> <div class="detail-actions"> <button id="zoomBtn">Zoom</button> <button id="coordBtn">Copy coords</button> <button id="gmapBtn">Google Maps</button> <button id="amapBtn">Apple Maps</button> </div> </div> </aside> <div id="toast" class="toast"></div> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script> <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script> <script> const $ = id => document.getElementById(id); const DEFAULT_PROJECTS = { 'Locations': { labelsDefault: true, visibleDefault: true, opacity: .38, pointMode: 'normal', color: '#0f766e' }, 'Structures': { labelsDefault: true, visibleDefault: true, opacity: .38, pointMode: 'normal', color: '#0f766e' }, 'Structures / Yards': { labelsDefault: true, visibleDefault: true, opacity: .38, pointMode: 'normal', color: '#0f766e' }, 'Chemical Locations': { labelsDefault: true, visibleDefault: true, opacity: .42, pointMode: 'normal', color: '#dc2626' }, 'Irrigation': { labelsDefault: false, visibleDefault: true, opacity: .34, pointMode: 'normal', color: '#0284c7' }, 'Owl Boxes': { labelsDefault: true, visibleDefault: true, opacity: .36, pointMode: 'normal', color: '#7c3aed' }, 'Prune North': { labelsDefault: false, visibleDefault: true, opacity: .25, pointMode: 'normal', color: '#ea580c' }, 'Prune South': { labelsDefault: false, visibleDefault: true, opacity: .25, pointMode: 'normal', color: '#f97316' }, 'Block #23': { labelsDefault: true, visibleDefault: true, opacity: .16, pointMode: 'normal', color: '#64748b' }, 'Block #25': { labelsDefault: true, visibleDefault: true, opacity: .16, pointMode: 'normal', color: '#475569' } }; const LOCATION_PALETTE = [ '#7c3aed', '#2563eb', '#0f766e', '#dc2626', '#ea580c', '#0891b2', '#16a34a', '#be185d', '#4f46e5', '#b45309', '#0e7490', '#9333ea', '#64748b', '#15803d', '#c026d3', '#0284c7', '#65a30d', '#db2777', '#4338ca', '#ca8a04' ]; const HARD_HIDE_PATTERNS = [ /\bsolar\s*panels?\s*0?2\b/i, /\bsolar\s*panels?\s*0?3\b/i, /\bwater\s*treatment\b/i, /\boffice\b/i, /\blab\b/i ]; const state = { items: [], filtered: [], groups: new Map(), config: DEFAULT_PROJECTS, current: null, showPolys: true, showPoints: true, allLabels: true, shortLabels: false, base: 'sat', polys: null, points: null, clusters: null, labels: [], userMarker: null, hiddenStructures: new Set(), hiddenLabels: new Set() }; function toast(t) { $('toast').textContent = t; $('toast').classList.add('show'); clearTimeout($('toast')._t); $('toast')._t = setTimeout(() => $('toast').classList.remove('show'), 2600); } function esc(s) { return String(s == null ? '' : s) .replace(/&/g, '&amp;') .replace(/</g, '&lt;') .replace(/>/g, '&gt;') .replace(/"/g, '&quot;') .replace(/'/g, '&#39;'); } function clean(s) { return String(s || '') .replace(/_/g, ' ') .replace(/\s+/g, ' ') .trim() .replace(/\b\w/g, m => m.toUpperCase()); } function norm(s) { return String(s || '') .toLowerCase() .replace(/_/g, ' ') .replace(/[^a-z0-9#]+/g, ' ') .replace(/\s+/g, ' ') .trim(); } function safeKey(s) { return String(s || '') .replace(/[^A-Za-z0-9_-]+/g, '_') .replace(/^_+|_+$/g, '') || 'item'; } function displayProject(name) { if (name === 'Structures / Yards' || name === 'Structures') return 'Locations'; return name || 'Locations'; } function projectOf(p) { const raw = p._project || p.project || p.Project || 'Locations'; if (raw === 'Structures / Yards' || raw === 'Structures') return 'Locations'; return raw; } function sourceLayer(p) { return p._layer || p.layer || p.Layer || p.Name || p.name || 'Layer'; } function featName(p) { return p.Name || p.name || p.Name_1 || p.Label || p.label || p._layer || p.layer || p.Layer || p.OBJECTID || p.FID || 'Location'; } function acronym(s) { return String(s || '') .split(/[ _-]+/) .filter(Boolean) .map(x => x[0]) .join('') .slice(0, 3) .toUpperCase() || 'LOC'; } function configFor(project) { return state.config[project] || DEFAULT_PROJECTS[project] || DEFAULT_PROJECTS['Locations']; } fun
