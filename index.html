<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SGN Map App</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <style>
    :root{
      --bg:#eef2f7;
      --panel:#fff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#d8e0ec;
      --brand:#0f766e;
      --shadow:0 12px 32px rgba(15,23,42,.12);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body,#map{height:100%;margin:0}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);overflow:hidden;background:#0f172a}
    #map{width:100%;height:100%}
    .topbar{
      position:absolute;left:12px;right:12px;top:12px;z-index:1000;
      display:flex;align-items:center;gap:10px;
      pointer-events:none;
    }
    .brand{
      display:flex;align-items:center;gap:10px;
      background:rgba(255,255,255,.94);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      border-radius:20px;
      padding:8px 12px;
      pointer-events:auto;
      max-width:min(520px,calc(100vw - 24px));
    }
    .logo{
      width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#0f766e);
      color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center;font-size:13px;
    }
    .brand-title{font-weight:900;font-size:16px;line-height:1.05}
    .brand-sub{color:var(--muted);font-size:12px;font-weight:700;margin-top:2px}
    .top-actions{margin-left:auto;display:flex;gap:8px;pointer-events:auto}
    button,.button-link{
      border:1px solid var(--border);
      background:#fff;color:#0f172a;
      border-radius:14px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 6px 16px rgba(15,23,42,.09);
      text-decoration:none;
      font-size:13px;
      white-space:nowrap;
    }
    button.primary,.button-link.primary{background:#0f766e;color:#fff;border-color:#0f766e}
    .panel{
      position:absolute;left:12px;top:76px;bottom:14px;width:340px;z-index:1000;
      background:rgba(255,255,255,.94);backdrop-filter:blur(16px);
      border:1px solid var(--border);box-shadow:var(--shadow);border-radius:22px;
      overflow:hidden;display:flex;flex-direction:column;
      transition:transform .22s ease,opacity .22s ease;
    }
    .panel.collapsed{transform:translateX(calc(-100% - 20px));opacity:.15;pointer-events:none}
    .panel-head{padding:14px;border-bottom:1px solid var(--border)}
    .search{width:100%;height:42px;border:1px solid var(--border);border-radius:14px;padding:0 12px;font-weight:800;outline:none}
    .quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .quick button{box-shadow:none;padding:10px 8px}
    .quick button.active{background:#ecfeff;border-color:#67e8f9;color:#155e75}
    .panel-body{overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .project-card{
      border:1px solid var(--border);border-radius:18px;background:#fff;overflow:hidden;
    }
    .project-main{
      display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer;
    }
    .swatch{width:14px;height:14px;border-radius:5px;border:1px solid rgba(15,23,42,.15);flex:0 0 14px}
    .project-name{font-weight:900;font-size:14px;line-height:1.1;flex:1;min-width:0}
    .project-count{font-size:11px;font-weight:900;color:#334155;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:999px;padding:4px 8px}
    .project-controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:0 10px 10px}
    .project-controls button{box-shadow:none;padding:7px 6px;font-size:11px}
    .layer-list{display:none;border-top:1px solid #eef2f7;padding:8px 10px 10px;background:#f8fafc}
    .project-card.open .layer-list{display:block}
    .layer-row{font-size:12px;color:#475569;display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid #eef2f7}
    .layer-row:last-child{border-bottom:none}
    .legend{
      position:absolute;right:12px;bottom:18px;z-index:1000;
      background:rgba(255,255,255,.94);border:1px solid var(--border);box-shadow:var(--shadow);
      border-radius:18px;padding:10px 12px;max-width:min(360px,calc(100vw - 24px));
      display:flex;flex-wrap:wrap;gap:7px;
    }
    .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:900;color:#334155}
    .label{
      color:#0f172a;font-weight:900;font-size:12px;white-space:nowrap;
      text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff,0 0 4px #fff;
      transform:translate(-50%,-50%);
      pointer-events:none;
      line-height:1.05;
      text-align:center;
    }
    .label.small{font-size:10px}
    .label.tiny{font-size:8px}
    .point-dot{
      width:13px;height:13px;border-radius:999px;border:2px solid #fff;box-shadow:0 1px 4px rgba(15,23,42,.35);
    }
    .popup h3{margin:0 0 8px;font-size:15px}
    .popup-grid{display:grid;grid-template-columns:auto 1fr;gap:5px 10px;font-size:12px}
    .popup-grid b{color:#475569}
    .status{
      position:absolute;left:50%;transform:translateX(-50%);bottom:16px;z-index:1000;
      background:rgba(15,23,42,.92);color:#fff;border-radius:999px;padding:9px 12px;font-weight:800;font-size:12px;
      box-shadow:var(--shadow);display:none;
    }
    .status.show{display:block}
    @media(max-width:800px){
      .brand-sub{display:none}
      .panel{width:min(360px,calc(100vw - 20px));top:70px}
      .legend{display:none}
      .top-actions{gap:5px}
      button,.button-link{padding:9px 10px}
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <div class="brand">
      <div class="logo">SGN</div>
      <div>
        <div class="brand-title">SGN Map App</div>
        <div id="subtitle" class="brand-sub">Loading map data...</div>
      </div>
    </div>
    <div class="top-actions">
      <button id="panelBtn">Open Layers</button>
      <a class="button-link primary" href="./import.html">Admin / Import</a>
      <button id="fitBtn">Fit Map</button>
    </div>
  </div>

  <aside id="panel" class="panel collapsed">
    <div class="panel-head">
      <input id="search" class="search" placeholder="Search project, layer, label..." />
      <div class="quick">
        <button id="satBtn" class="active">Satellite</button>
        <button id="streetBtn">Street</button>
        <button id="labelsBtn" class="active">Labels On</button>
        <button id="pointsBtn" class="active">Points On</button>
        <button id="polysBtn" class="active">Polygons On</button>
        <button id="linesBtn" class="active">Lines On</button>
      </div>
    </div>
    <div id="projectList" class="panel-body"></div>
  </aside>

  <div id="legend" class="legend"></div>
  <div id="status" class="status"></div>

  <script>
    const GENERIC_LABELS = new Set([
      "polygon","polygons","point","points","line","lines","layer","layers",
      "shape","shapes","feature","features","area","areas","multipolygon","multipolygons"
    ]);

    const COLORS = [
      "#0f766e","#0284c7","#7c3aed","#b45309","#dc2626","#0891b2",
      "#4f46e5","#be185d","#15803d","#9333ea","#64748b","#f59e0b",
      "#ea580c","#14b8a6","#2563eb","#16a34a","#ca8a04","#0ea5e9",
      "#7e22ce","#c2410c","#65a30d","#0369a1","#a16207","#be123c","#047857"
    ];

    const state = {
      polygons: [],
      points: [],
      lines: [],
      config: null,
      manifest: null,
      allFeatures: [],
      projects: new Map(),
      projectVisible: new Map(),
      projectLabels: new Map(),
      showLabels: true,
      showPoints: true,
      showPolygons: true,
      showLines: true,
      query: "",
      labelMarkers: [],
      polygonLayer: null,
      pointLayer: null,
      lineLayer: null,
      base: "satellite"
    };

    const $ = id => document.getElementById(id);

    const map = L.map("map", {
      zoomControl: true,
      preferCanvas: true
    }).setView([36.78, -119.42], 15);

    const satellite = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      { maxNativeZoom: 19, maxZoom: 22, attribution: "Tiles © Esri" }
    ).addTo(map);

    const street = L.tileLayer(
      "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      { maxZoom: 22, attribution: "© OpenStreetMap" }
    );

    function status(msg, timeout=2200){
      const el = $("status");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(el._t);
      el._t = setTimeout(()=>el.classList.remove("show"), timeout);
    }

    async function loadJson(path, fallback=null){
      const res = await fetch(path + "?v=" + Date.now(), { cache: "no-store" });
      if (!res.ok) {
        if (fallback !== null) return fallback;
        throw new Error(path + " returned " + res.status);
      }
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error(path + " returned non-JSON");
      }
    }

    function clean(v){
      return String(v || "").trim();
    }

    function meaningful(v){
      const s = clean(v);
      if (!s) return false;
      if (GENERIC_LABELS.has(s.toLowerCase())) return false;
      if (/^[\d\W_]+$/.test(s)) return false;
      return true;
    }

    function bestLabel(props){
      const preferred = [
        "_label","Name","NAME","name","Label","LABEL","label","Title","TITLE","title",
        "Block","BLOCK","block","BlockName","BLOCKNAME","Block_Name","block_name",
        "Orchard","ORCHARD","orchard","Variety","VARIETY","variety","Site","SITE","site",
        "AreaName","AREANAME","area_name","Description","DESCRIPTION","description"
      ];
      for (const key of preferred) {
        if (props && Object.prototype.hasOwnProperty.call(props, key) && meaningful(props[key])) {
          return clean(props[key]);
        }
      }
      if (props) {
        for (const [key, value] of Object.entries(props)) {
          const k = key.toLowerCase();
          if ((k.includes("name") || k.includes("label") || k.includes("block") || k.includes("site") || k.includes("orchard") || k.includes("variety")) && meaningful(value)) {
            return clean(value);
          }
        }
      }
      const layer = props?._layer || props?._layer_display;
      if (meaningful(layer)) return String(layer).replace(/_/g, " ");
      return "";
    }

    function projectName(feature){
      return feature?.properties?._project || "Other";
    }

    function groupKey(feature){
      const props = feature.properties || {};
      let base = props._group_key || bestLabel(props) || props._layer || props._project || "other";
      base = String(base).toLowerCase().replace(/[^a-z0-9#]+/g,"_").replace(/^_+|_+$/g,"");
      if (!base) base = "other";

      const layer = String(props._layer || "");
      const m1 = layer.match(/^(High_Tunnels_\d+)(?:_[A-Za-z])?$/i);
      if (m1) return m1[1].toLowerCase();
      const m2 = layer.match(/^(Can_Yard_\d+)(?:_[A-Za-z])?$/i);
      if (m2) return m2[1].toLowerCase();
      const m3 = layer.match(/^(Shade_House_\d+|Shadehouse_\d+)(?:_[A-Za-z])?$/i);
      if (m3) return m3[1].toLowerCase();
      if (/^Four_Bays?_\d+$/i.test(layer)) return "four_bays";
      return base;
    }

    function colorForKey(key){
      let h = 0;
      for (const ch of String(key)) h = ((h << 5) - h + ch.charCodeAt(0)) >>> 0;
      return COLORS[h % COLORS.length];
    }

    function colorForFeature(feature){
      return feature?.properties?._group_color || colorForKey(groupKey(feature));
    }

    function projectColor(project){
      let h = 0;
      for (const ch of String(project)) h = ((h << 5) - h + ch.charCodeAt(0)) >>> 0;
      return COLORS[h % COLORS.length];
    }

    function featureCenter(feature){
      try {
        if (feature.geometry && feature.geometry.type === "Point") {
          const c = feature.geometry.coordinates;
          return [c[1], c[0]];
        }
        const pt = turf.pointOnFeature(feature);
        return [pt.geometry.coordinates[1], pt.geometry.coordinates[0]];
      } catch (e) {
        try {
          const c = turf.center(feature).geometry.coordinates;
          return [c[1], c[0]];
        } catch (_) {
          return null;
        }
      }
    }

    function areaText(feature){
      try {
        const sqm = turf.area(feature);
        if (!Number.isFinite(sqm) || sqm <= 0) return "";
        const ac = sqm * 0.000247105;
        return ac.toFixed(2) + " ac";
      } catch(e) {
        return "";
      }
    }

    function popupHtml(feature){
      const props = feature.properties || {};
      const label = bestLabel(props) || "Feature";
      const center = featureCenter(feature);
      const coords = center ? center[0].toFixed(6) + ", " + center[1].toFixed(6) : "";
      const area = feature.geometry && /Polygon/i.test(feature.geometry.type) ? areaText(feature) : "";
      return `
        <div class="popup">
          <h3>${escapeHtml(label)}</h3>
          <div class="popup-grid">
            <b>Project</b><span>${escapeHtml(projectName(feature))}</span>
            <b>Layer</b><span>${escapeHtml(props._layer_display || props._layer || "")}</span>
            ${area ? `<b>Area</b><span>${escapeHtml(area)}</span>` : ""}
            ${coords ? `<b>Coords</b><span>${escapeHtml(coords)}</span>` : ""}
          </div>
        </div>`;
    }

    function escapeHtml(v){
      return String(v ?? "").replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[s]));
    }

    function shouldShowFeature(feature){
      const p = projectName(feature);
      if (state.projectVisible.has(p) && !state.projectVisible.get(p)) return false;
      if (!state.query) return true;

      const props = feature.properties || {};
      const hay = [
        projectName(feature), bestLabel(props), props._layer, props._layer_display, props._gdb, props._package
      ].join(" ").toLowerCase();

      return hay.includes(state.query.toLowerCase());
    }

    function shouldLabelFeature(feature){
      if (!state.showLabels) return false;
      const p = projectName(feature);
      if (state.projectLabels.has(p) && !state.projectLabels.get(p)) return false;
      const label = bestLabel(feature.properties || {});
      if (!meaningful(label)) return false;

      // Avoid label overload from very dense tree point layers until zoomed in.
      const project = p.toLowerCase();
      if (project.includes("tree") && map.getZoom() < 19) return false;
      return true;
    }

    function labelClass(feature){
      try {
        const a = turf.area(feature);
        if (a > 20000) return "";
        if (a > 5000) return "small";
        return "tiny";
      } catch (e) {
        return "tiny";
      }
    }

    function clearLabels(){
      state.labelMarkers.forEach(m => map.removeLayer(m));
      state.labelMarkers = [];
    }

    function renderLabels(features){
      clearLabels();
      if (!state.showLabels) return;

      const used = new Set();
      for (const feature of features) {
        if (!shouldLabelFeature(feature)) continue;

        const props = feature.properties || {};
        const label = bestLabel(props);
        if (!label) continue;

        const center = featureCenter(feature);
        if (!center) continue;

        // De-dupe labels near same rounded coordinate.
        const key = label.toLowerCase() + "|" + center[0].toFixed(5) + "|" + center[1].toFixed(5);
        if (used.has(key)) continue;
        used.add(key);

        const cls = labelClass(feature);
        const icon = L.divIcon({
          className: "",
          html: `<div class="label ${cls}">${escapeHtml(label)}</div>`
        });
        const m = L.marker(center, { icon, interactive:false, keyboard:false });
        m.addTo(map);
        state.labelMarkers.push(m);
      }
    }

    function renderLayers(){
      if (state.polygonLayer) map.removeLayer(state.polygonLayer);
      if (state.pointLayer) map.removeLayer(state.pointLayer);
      if (state.lineLayer) map.removeLayer(state.lineLayer);
      clearLabels();

      const visiblePolys = state.polygons.filter(shouldShowFeature);
      const visiblePoints = state.points.filter(shouldShowFeature);
      const visibleLines = state.lines.filter(shouldShowFeature);

      if (state.showPolygons) {
        state.polygonLayer = L.geoJSON({ type:"FeatureCollection", features:visiblePolys }, {
          style: f => ({
            color: colorForFeature(f),
            weight: 2,
            opacity: .95,
            fillColor: colorForFeature(f),
            fillOpacity: projectName(f).toLowerCase().startsWith("block") ? .22 : .30
          }),
          onEachFeature: (f, layer) => layer.bindPopup(popupHtml(f))
        }).addTo(map);
      }

      if (state.showLines) {
        state.lineLayer = L.geoJSON({ type:"FeatureCollection", features:visibleLines }, {
          style: f => ({
            color: colorForFeature(f),
            weight: 3,
            opacity: .95
          }),
          onEachFeature: (f, layer) => layer.bindPopup(popupHtml(f))
        }).addTo(map);
      }

      if (state.showPoints) {
        state.pointLayer = L.geoJSON({ type:"FeatureCollection", features:visiblePoints }, {
          pointToLayer: (f, latlng) => {
            const color = colorForFeature(f);
            const p = projectName(f).toLowerCase();
            const r = p.includes("tree") ? 3 : 6;
            return L.circleMarker(latlng, {
              radius: r,
              color: "#fff",
              weight: p.includes("tree") ? 1 : 2,
              fillColor: color,
              fillOpacity: p.includes("tree") ? .70 : 1
            });
          },
          onEachFeature: (f, layer) => layer.bindPopup(popupHtml(f))
        }).addTo(map);
      }

      // Label polygons/lines and sparse points. Dense tree labels only at high zoom.
      renderLabels([...visiblePolys, ...visibleLines, ...visiblePoints]);
      updateSubtitle(visiblePolys.length, visiblePoints.length, visibleLines.length);
    }

    function updateSubtitle(polyCount, pointCount, lineCount){
      $("subtitle").textContent = `${polyCount.toLocaleString()} polygons • ${pointCount.toLocaleString()} points • ${lineCount.toLocaleString()} lines loaded`;
    }

    function buildProjects(){
      state.projects.clear();
      for (const f of [...state.polygons, ...state.points, ...state.lines]) {
        const p = projectName(f);
        if (!state.projects.has(p)) {
          state.projects.set(p, { name:p, count:0, layers:new Map(), color: projectColor(p) });
          state.projectVisible.set(p, true);
          state.projectLabels.set(p, true);
        }
        const obj = state.projects.get(p);
        obj.count += 1;
        const layer = f.properties?._layer_display || f.properties?._layer || "Features";
        obj.layers.set(layer, (obj.layers.get(layer) || 0) + 1);
      }
    }

    function renderProjectList(){
      const list = $("projectList");
      const items = [...state.projects.values()].sort((a,b)=>a.name.localeCompare(b.name));

      list.innerHTML = items.map(p => `
        <div class="project-card" data-project="${escapeHtml(p.name)}">
          <div class="project-main" data-toggle="${escapeHtml(p.name)}">
            <span class="swatch" style="background:${p.color}"></span>
            <span class="project-name">${escapeHtml(p.name)}</span>
            <span class="project-count">${p.count.toLocaleString()}</span>
          </div>
          <div class="project-controls">
            <button data-visible="${escapeHtml(p.name)}">Visible</button>
            <button data-labels="${escapeHtml(p.name)}">Labels</button>
            <button data-zoom="${escapeHtml(p.name)}">Zoom</button>
          </div>
          <div class="layer-list">
            ${[...p.layers.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([layer,count]) => `
              <div class="layer-row"><span>${escapeHtml(layer || "Features")}</span><b>${count.toLocaleString()}</b></div>
            `).join("")}
          </div>
        </div>
      `).join("");

      list.querySelectorAll("[data-toggle]").forEach(el => {
        el.onclick = () => el.closest(".project-card").classList.toggle("open");
      });
      list.querySelectorAll("[data-visible]").forEach(el => {
        el.onclick = () => {
          const p = el.dataset.visible;
          state.projectVisible.set(p, !state.projectVisible.get(p));
          el.textContent = state.projectVisible.get(p) ? "Visible" : "Hidden";
          renderLayers();
        };
      });
      list.querySelectorAll("[data-labels]").forEach(el => {
        el.onclick = () => {
          const p = el.dataset.labels;
          state.projectLabels.set(p, !state.projectLabels.get(p));
          el.textContent = state.projectLabels.get(p) ? "Labels" : "No Labels";
          renderLayers();
        };
      });
      list.querySelectorAll("[data-zoom]").forEach(el => {
        el.onclick = () => zoomProject(el.dataset.zoom);
      });
    }

    function renderLegend(){
      const legend = $("legend");
      const items = [...state.projects.values()].sort((a,b)=>a.name.localeCompare(b.name)).slice(0,12);
      legend.innerHTML = items.map(p => `
        <span class="legend-item"><span class="swatch" style="background:${p.color}"></span>${escapeHtml(p.name)}</span>
      `).join("");
    }

    function zoomProject(project){
      const feats = [...state.polygons, ...state.points, ...state.lines].filter(f => projectName(f) === project);
      if (!feats.length) return;
      const layer = L.geoJSON({ type:"FeatureCollection", features:feats });
      const b = layer.getBounds();
      if (b.isValid()) map.fitBounds(b.pad(.15));
    }

    function fitAll(){
      const feats = [...state.polygons, ...state.points, ...state.lines].filter(shouldShowFeature);
      if (!feats.length) return;
      const layer = L.geoJSON({ type:"FeatureCollection", features:feats });
      const b = layer.getBounds();
      if (b.isValid()) map.fitBounds(b.pad(.08));
    }

    function setupControls(){
      $("panelBtn").onclick = () => {
        $("panel").classList.toggle("collapsed");
        $("panelBtn").textContent = $("panel").classList.contains("collapsed") ? "Open Layers" : "Close Layers";
      };
      $("fitBtn").onclick = fitAll;

      $("satBtn").onclick = () => {
        if (map.hasLayer(street)) map.removeLayer(street);
        if (!map.hasLayer(satellite)) satellite.addTo(map);
        $("satBtn").classList.add("active");
        $("streetBtn").classList.remove("active");
      };
      $("streetBtn").onclick = () => {
        if (map.hasLayer(satellite)) map.removeLayer(satellite);
        if (!map.hasLayer(street)) street.addTo(map);
        $("streetBtn").classList.add("active");
        $("satBtn").classList.remove("active");
      };

      $("labelsBtn").onclick = () => {
        state.showLabels = !state.showLabels;
        $("labelsBtn").classList.toggle("active", state.showLabels);
        $("labelsBtn").textContent = state.showLabels ? "Labels On" : "Labels Off";
        renderLayers();
      };
      $("pointsBtn").onclick = () => {
        state.showPoints = !state.showPoints;
        $("pointsBtn").classList.toggle("active", state.showPoints);
        $("pointsBtn").textContent = state.showPoints ? "Points On" : "Points Off";
        renderLayers();
      };
      $("polysBtn").onclick = () => {
        state.showPolygons = !state.showPolygons;
        $("polysBtn").classList.toggle("active", state.showPolygons);
        $("polysBtn").textContent = state.showPolygons ? "Polygons On" : "Polygons Off";
        renderLayers();
      };
      $("linesBtn").onclick = () => {
        state.showLines = !state.showLines;
        $("linesBtn").classList.toggle("active", state.showLines);
        $("linesBtn").textContent = state.showLines ? "Lines On" : "Lines Off";
        renderLayers();
      };

      $("search").oninput = e => {
        state.query = e.target.value.trim();
        renderLayers();
      };

      map.on("zoomend moveend", () => {
        renderLayers();
      });
    }

    async function init(){
      try {
        setupControls();

        const [polys, points, lines, manifest, config] = await Promise.all([
          loadJson("data/map/combined_polygons.geojson", { type:"FeatureCollection", features:[] }),
          loadJson("data/map/combined_points.geojson", { type:"FeatureCollection", features:[] }),
          loadJson("data/map/combined_lines.geojson", { type:"FeatureCollection", features:[] }),
          loadJson("data/map/project_manifest.json", null).catch(()=>null),
          loadJson("data/map/map_config.json", null).catch(()=>null)
        ]);

        state.polygons = polys.features || [];
        state.points = points.features || [];
        state.lines = lines.features || [];
        state.manifest = manifest;
        state.config = config;

        buildProjects();
        renderProjectList();
        renderLegend();
        renderLayers();
        fitAll();

        status("Map loaded");
      } catch (err) {
        console.error(err);
        $("subtitle").textContent = "Map failed to load";
        status("Map failed to load: " + err.message, 6000);
      }
    }

    init();
  </script>
</body>
</html>
