<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SGN Map App</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <style>
    :root{--bg:#eef2f7;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#d8e0ec;--brand:#0f766e;--shadow:0 12px 32px rgba(15,23,42,.14)}
    *{box-sizing:border-box}html,body,#map{height:100%;margin:0}body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);overflow:hidden;background:#0f172a}#map{width:100%;height:100%}
    .topbar{position:absolute;left:12px;right:12px;top:12px;z-index:1000;display:flex;align-items:center;gap:10px;pointer-events:none}.brand{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.95);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:20px;padding:8px 12px;pointer-events:auto;max-width:min(680px,calc(100vw - 24px))}.logo{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#0f766e);color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center;font-size:13px}.brand-title{font-weight:900;font-size:16px;line-height:1.05}.brand-sub{color:var(--muted);font-size:12px;font-weight:700;margin-top:2px}.top-actions{margin-left:auto;display:flex;gap:8px;pointer-events:auto}
    button,.button-link{border:1px solid var(--border);background:#fff;color:#0f172a;border-radius:14px;padding:10px 12px;font-weight:900;cursor:pointer;box-shadow:0 6px 16px rgba(15,23,42,.09);text-decoration:none;font-size:13px;white-space:nowrap}button.primary,.button-link.primary{background:#0f766e;color:#fff;border-color:#0f766e}button.active{background:#ecfeff;border-color:#67e8f9;color:#155e75}button.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
    .panel{position:absolute;left:12px;top:76px;bottom:14px;width:410px;z-index:1000;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:22px;overflow:hidden;display:flex;flex-direction:column;transition:transform .22s ease,opacity .22s ease}.panel.collapsed{transform:translateX(calc(-100% - 20px));opacity:.15;pointer-events:none}.panel-head{padding:14px;border-bottom:1px solid var(--border)}.search{width:100%;height:42px;border:1px solid var(--border);border-radius:14px;padding:0 12px;font-weight:800;outline:none}.quick{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:10px}.quick button{box-shadow:none;padding:10px 8px;font-size:12px}.panel-body{overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .project-card{border:1px solid var(--border);border-radius:18px;background:#fff;overflow:hidden}.project-main{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer}.swatch{width:14px;height:14px;border-radius:5px;border:1px solid rgba(15,23,42,.15);flex:0 0 14px}.project-name{font-weight:900;font-size:14px;line-height:1.1;flex:1;min-width:0}.project-count{font-size:11px;font-weight:900;color:#334155;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:999px;padding:4px 8px}.project-controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:0 10px 10px}.project-controls button{box-shadow:none;padding:7px 6px;font-size:11px}.layer-list{display:none;border-top:1px solid #eef2f7;padding:8px 10px 10px;background:#f8fafc;max-height:230px;overflow:auto}.project-card.open .layer-list{display:block}.layer-row{font-size:12px;color:#475569;display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid #eef2f7}.layer-row:last-child{border-bottom:none}.lazy-note{font-size:11px;font-weight:800;color:#9a3412;padding:0 10px 10px}.badge{font-size:10px;font-weight:900;color:#155e75;background:#ecfeff;border:1px solid #a5f3fc;border-radius:999px;padding:3px 7px}
    .legend{position:absolute;right:12px;bottom:18px;z-index:1000;background:rgba(255,255,255,.94);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:18px;padding:10px 12px;max-width:min(520px,calc(100vw - 24px));display:flex;flex-wrap:wrap;gap:7px}.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:900;color:#334155}.label{color:#0f172a;font-weight:900;font-size:12px;white-space:nowrap;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff,0 0 5px #fff;transform:translate(-50%,-50%);pointer-events:none;line-height:1.05;text-align:center}.label.small{font-size:10px}.label.tiny{font-size:8px}.popup h3{margin:0 0 8px;font-size:15px}.popup-grid{display:grid;grid-template-columns:auto 1fr;gap:5px 10px;font-size:12px}.popup-grid b{color:#475569}.status{position:absolute;left:50%;transform:translateX(-50%);bottom:16px;z-index:1000;background:rgba(15,23,42,.92);color:#fff;border-radius:999px;padding:9px 12px;font-weight:800;font-size:12px;box-shadow:var(--shadow);display:none}.status.show{display:block}
    .hover-card{position:absolute;z-index:1200;display:none;pointer-events:none;background:rgba(255,255,255,.97);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:14px;padding:9px 10px;max-width:280px;font-size:12px;font-weight:800;color:#0f172a}
    .hover-card b{display:block;font-size:13px;margin-bottom:3px}.loadingbar{position:absolute;left:12px;right:12px;top:66px;height:4px;z-index:1001;background:rgba(255,255,255,.35);border-radius:999px;overflow:hidden;display:none}.loadingbar.show{display:block}.loadingbar>div{height:100%;width:0;background:#0f766e;transition:width .2s ease}.tree-tooltip{font-weight:800;font-size:12px;line-height:1.3}
    @media(max-width:800px){.brand-sub{display:none}.panel{width:min(410px,calc(100vw - 20px));top:70px}.legend{display:none}.quick{grid-template-columns:1fr 1fr}.top-actions .button-link{display:none}}
  </style>
</head>
<body>
  <div id="map"></div><div id="loadingbar" class="loadingbar"><div></div></div>
  <div class="topbar"><div class="brand"><div class="logo">SGN</div><div><div class="brand-title">SGN Map App</div><div id="subtitle" class="brand-sub">Loading manifest only...</div></div></div><div class="top-actions"><button id="panelBtn">Open Layers</button><a class="button-link primary" href="./import.html">Admin / Import</a><button id="fitBtn">Fit Map</button></div></div>
  <aside id="panel" class="panel collapsed"><div class="panel-head"><input id="search" class="search" placeholder="Search loaded project, layer, label..." /><div class="quick"><button id="satBtn" class="active">Satellite</button><button id="streetBtn">Street</button><button id="labelsBtn" class="active">Labels</button><button id="pointsBtn" class="active">Points</button><button id="polysBtn" class="active">Polygons</button><button id="linesBtn" class="active">Lines</button></div></div><div id="projectList" class="panel-body"></div></aside>
  <div id="legend" class="legend"></div><div id="status" class="status"></div>
  <div id="hoverCard" class="hover-card"></div>
  <script>
    const GENERIC_LABELS=new Set(["polygon","polygons","point","points","line","lines","layer","layers","shape","shapes","feature","features","area","areas","multipolygon","multipolygons","one one three zero eas merge","one one three zero east merge"]);
    const COLORS=["#0f766e","#0284c7","#7c3aed","#b45309","#dc2626","#0891b2","#4f46e5","#be185d","#15803d","#9333ea","#64748b","#f59e0b","#ea580c","#14b8a6","#2563eb","#16a34a","#ca8a04","#0ea5e9","#7e22ce","#c2410c","#65a30d","#0369a1","#a16207","#be123c","#047857"];
    const state={manifest:null,projects:[],loaded:new Map(),visible:new Map(),labels:new Map(),layers:new Map(),labelMarkers:[],detailLoaded:new Set(),query:"",showLabels:true,showPoints:true,showPolygons:true,showLines:true,loadingCount:0,totalCoreFiles:0,loadedCoreFiles:0};
    const $=id=>document.getElementById(id);
    const START_CENTER=[39.0717,-121.6139];
    const START_ZOOM=16;
    const map=L.map("map",{zoomControl:true,preferCanvas:true,renderer:L.canvas({padding:.5}),updateWhenIdle:true,updateWhenZooming:false,wheelDebounceTime:60}).setView(START_CENTER,START_ZOOM);
    const satellite=L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxNativeZoom:19,maxZoom:22,attribution:"Tiles © Esri"}).addTo(map);
    const street=L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:22,attribution:"© OpenStreetMap"});
    function status(msg,timeout=2200){const el=$("status");el.textContent=msg;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),timeout)}
    function progress(){const bar=$("loadingbar"),fill=bar.firstElementChild;if(state.loadingCount>0){bar.classList.add("show");const pct=state.totalCoreFiles?Math.min(100,Math.round(state.loadedCoreFiles/state.totalCoreFiles*100)):15;fill.style.width=pct+"%"}else{fill.style.width="100%";setTimeout(()=>{bar.classList.remove("show");fill.style.width="0"},450)}}
    const DB_NAME="sgn-map-cache-v4",DB_STORE="geojson",CACHE_TTL_MS=1000*60*60*24*14;
    function openDb(){return new Promise(resolve=>{if(!("indexedDB" in window))return resolve(null);const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=()=>req.result.createObjectStore(DB_STORE,{keyPath:"path"});req.onsuccess=()=>resolve(req.result);req.onerror=()=>resolve(null)})}
    const dbPromise=openDb();
    async function cacheGet(path){const db=await dbPromise;if(!db)return null;return new Promise(resolve=>{const tx=db.transaction(DB_STORE,"readonly"),req=tx.objectStore(DB_STORE).get(path);req.onsuccess=()=>{const row=req.result;if(!row||Date.now()-row.time>CACHE_TTL_MS)return resolve(null);resolve(row.data)};req.onerror=()=>resolve(null)})}
    async function cacheSet(path,data){const db=await dbPromise;if(!db)return;return new Promise(resolve=>{const tx=db.transaction(DB_STORE,"readwrite");tx.objectStore(DB_STORE).put({path,time:Date.now(),data});tx.oncomplete=()=>resolve();tx.onerror=()=>resolve()})}
    async function loadJson(path){const cached=await cacheGet(path);if(cached)return cached;state.loadingCount++;progress();try{const res=await fetch(path,{cache:"force-cache"});if(!res.ok)throw new Error(path+" returned "+res.status);const data=await res.json();cacheSet(path,data);return data}finally{state.loadingCount--;progress()}}
    function escapeHtml(v){return String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]))}
    function textOfFile(file){return [file.path,file.layerKey,file.layerName,file.type].join(" ").toLowerCase().replace(/[_-]+/g," ")}
    function isTreeSpaceFile(file){const s=textOfFile(file);return file.type==="point"&&(s.includes("space")||s.includes("exportfeature")||s.includes("tree")||s.includes("one one three zero eas merge")||s.includes("one one three zero east merge"))}
    function isLabelPointFile(file){const s=textOfFile(file);return file.type==="point"&&(s.includes("label point")||s.includes("label_points"))}
    function isCoreFile(file){if(isTreeSpaceFile(file))return false;if(file.type==="point"&&!isLabelPointFile(file))return false;return true}
    function meaningful(v){const s=String(v??"").trim();if(!s)return false;if(GENERIC_LABELS.has(s.toLowerCase()))return false;if(/one\s+one\s+three\s+zero/i.test(s))return false;if(/^[\d\W_]+$/.test(s))return false;return true}
    function bestLabel(props){const keys=["_label","Name","NAME","name","Label","LABEL","label","Title","TITLE","title","Block","BLOCK","block","BlockName","BLOCKNAME","Block_Name","block_name","Orchard","ORCHARD","orchard","Variety","VARIETY","variety","Site","SITE","site","AreaName","AREANAME","area_name","Description","DESCRIPTION","description"];for(const k of keys){if(props&&Object.prototype.hasOwnProperty.call(props,k)&&meaningful(props[k]))return String(props[k]).trim()}if(props){for(const [k,v]of Object.entries(props)){const low=k.toLowerCase();if((low.includes("name")||low.includes("label")||low.includes("block")||low.includes("site")||low.includes("orchard"))&&meaningful(v))return String(v).trim()}}return""}
    function featureCenter(feature){try{if(feature.geometry&&feature.geometry.type==="Point"){const c=feature.geometry.coordinates;return[c[1],c[0]]}const pt=turf.pointOnFeature(feature);return[pt.geometry.coordinates[1],pt.geometry.coordinates[0]]}catch(e){try{const c=turf.center(feature).geometry.coordinates;return[c[1],c[0]]}catch(_){return null}}}
    function colorForKey(key){let h=0;for(const ch of String(key))h=((h<<5)-h+ch.charCodeAt(0))>>>0;return COLORS[h%COLORS.length]}
    function colorForFeature(f){return f?.properties?._group_color||colorForKey(f?.properties?._group_key||f?.properties?._project||"other")}
    function areaText(f){try{const sqm=turf.area(f);if(!Number.isFinite(sqm)||sqm<=0)return"";return(sqm*.000247105).toFixed(2)+" ac"}catch(e){return""}}
    function popupHtml(f){const p=f.properties||{},label=bestLabel(p)||p._layer_display||p._project||"Feature",center=featureCenter(f),coords=center?center[0].toFixed(6)+", "+center[1].toFixed(6):"",area=f.geometry&&/Polygon/i.test(f.geometry.type)?areaText(f):"";return`<div class="popup"><h3>${escapeHtml(label)}</h3><div class="popup-grid"><b>Project</b><span>${escapeHtml(p._project||"")}</span><b>Layer</b><span>${escapeHtml(p._layer_display||p._layer||"")}</span>${area?`<b>Area</b><span>${escapeHtml(area)}</span>`:""}${coords?`<b>Coords</b><span>${escapeHtml(coords)}</span>`:""}</div></div>`}
    function fileTypeVisible(type){return type==="point"?state.showPoints:type==="polygon"?state.showPolygons:type==="line"?state.showLines:true}
    function featurePassesSearch(f){if(!state.query)return true;const p=f.properties||{};return[p._project,p._layer,p._layer_display,p._label,bestLabel(p),p._gdb,p._package].join(" ").toLowerCase().includes(state.query.toLowerCase())}
    function clearProjectLayers(projectKey){(state.layers.get(projectKey)||[]).forEach(layer=>map.removeLayer(layer));state.layers.set(projectKey,[]);clearLabels()}
    function clearLabels(){state.labelMarkers.forEach(m=>map.removeLayer(m));state.labelMarkers=[]}
    function labelClass(f){try{const a=turf.area(f);if(a>20000)return"";if(a>5000)return"small";return"tiny"}catch(e){return"tiny"}}
    function renderLabels(){clearLabels();if(!state.showLabels)return;const used=new Set();for(const project of state.projects){if(!state.visible.get(project.key)||!state.labels.get(project.key))continue;const loaded=state.loaded.get(project.key);if(!loaded)continue;for(const file of loaded.files){if(isTreeSpaceFile(file.meta))continue;for(const f of file.features){if(!featurePassesSearch(f))continue;const label=bestLabel(f.properties||{});if(!meaningful(label))continue;const center=featureCenter(f);if(!center)continue;const key=label.toLowerCase()+"|"+center[0].toFixed(5)+"|"+center[1].toFixed(5);if(used.has(key))continue;used.add(key);const icon=L.divIcon({className:"",html:`<div class="label ${labelClass(f)}">${escapeHtml(label)}</div>`});state.labelMarkers.push(L.marker(center,{icon,interactive:false,keyboard:false}).addTo(map))}}}}
    async function loadProject(project,includeDetails=false){let loaded=state.loaded.get(project.key);if(!loaded){loaded={files:[],loadedPaths:new Set()};state.loaded.set(project.key,loaded)}const files=project.files.filter(f=>(includeDetails||isCoreFile(f))&&!loaded.loadedPaths.has(f.path));if(!files.length)return loaded;status((includeDetails?"Loading details for ":"Loading outline for ")+project.name+"...",4000);for(const file of files){try{const data=await loadJson(file.path);loaded.files.push({meta:file,features:data.features||[]});loaded.loadedPaths.add(file.path);if(isCoreFile(file))state.loadedCoreFiles++}catch(err){console.warn("Failed to load",file.path,err)}}if(includeDetails)state.detailLoaded.add(project.key);updateSubtitle();return loaded}
    function bindFeature(project,file,f,l){if(isTreeSpaceFile(file.meta)){const label=bestLabel(f.properties||{})||f.properties?._layer_display||"Tree space";l.bindTooltip(`<div class="tree-tooltip">${escapeHtml(label)}</div>`,{direction:"top",sticky:true,opacity:.95});l.on("click",()=>l.openTooltip())}else{l.bindPopup(popupHtml(f))}if(f.geometry&&/Polygon/i.test(f.geometry.type)){l.on("click",async()=>{if(!state.detailLoaded.has(project.key)){status("Loading tree spaces/details for "+project.name+"...",5000);await loadProject(project,true);await renderProject(project, state.detailLoaded.has(project.key));status("Details loaded for "+project.name)}})}}
    async function renderProject(project, includeDetail=false){clearProjectLayers(project.key);if(!state.visible.get(project.key))return;const loaded=await loadProject(project,false);const layers=[];for(const file of loaded.files){const type=file.meta.type;if(!fileTypeVisible(type))continue;const features=file.features.filter(featurePassesSearch);if(!features.length)continue;const fc={type:"FeatureCollection",features};if(type==="polygon"){layers.push(L.geoJSON(fc,{renderer:L.canvas(),style:f=>({color:"#111827",weight:2.6,opacity:.98,fillColor:colorForFeature(f),fillOpacity:.28}),onEachFeature:(f,l)=>bindFeature(project,file,f,l)}).addTo(map))}if(type==="line"){layers.push(L.geoJSON(fc,{renderer:L.canvas(),style:f=>({color:"#111827",weight:4,opacity:.9}),onEachFeature:(f,l)=>bindFeature(project,file,f,l)}).addTo(map))}if(type==="point"){layers.push(L.geoJSON(fc,{renderer:L.canvas(),pointToLayer:(f,latlng)=>{const detail=isTreeSpaceFile(file.meta);return L.circleMarker(latlng,{radius:detail?2.25:6,color:"#111827",weight:detail?.45:1.5,fillColor:colorForFeature(f),fillOpacity:detail?.55:1})},onEachFeature:(f,l)=>bindFeature(project,file,f,l)}).addTo(map))}}
      state.layers.set(project.key,layers);renderLabels();buildPanel(false)}
    async function renderVisible(){const jobs=state.projects.filter(p=>state.visible.get(p.key)).map(p=>renderProject(p));await Promise.all(jobs);renderLegend();updateSubtitle();renderLabels()}
    function updateSubtitle(){let loadedFeatures=0,detailFeatures=0;for(const loaded of state.loaded.values()){for(const file of loaded.files){loadedFeatures+=file.features.length;if(isTreeSpaceFile(file.meta))detailFeatures+=file.features.length}}$("subtitle").textContent=`Fast mode: outlines first • ${loadedFeatures.toLocaleString()} loaded${detailFeatures?` • ${detailFeatures.toLocaleString()} detail points`:""}`}
    function buildPanel(rebind=true){const list=$("projectList");list.innerHTML=state.projects.map(project=>{const detailCount=project.files.filter(isTreeSpaceFile).reduce((n,f)=>n+Number(f.count||0),0),coreCount=project.files.filter(isCoreFile).reduce((n,f)=>n+Number(f.count||0),0),details=state.detailLoaded.has(project.key);return`<div class="project-card" data-project="${escapeHtml(project.key)}"><div class="project-main" data-toggle="${escapeHtml(project.key)}"><span class="swatch" style="background:${project.color}"></span><span class="project-name">${escapeHtml(project.name)}</span><span class="badge">${details?"details loaded":"fast"}</span><span class="project-count">${Number(project.featureCount||0).toLocaleString()}</span></div><div class="project-controls"><button data-visible="${escapeHtml(project.key)}">${state.visible.get(project.key)?"Visible":"Hidden"}</button><button data-details="${escapeHtml(project.key)}" class="${details?"":"warn"}">${details?"Details On":"Load Details"}</button><button data-zoom="${escapeHtml(project.key)}">Zoom</button></div>${detailCount&&!details?`<div class="lazy-note">Skipping ${detailCount.toLocaleString()} tree/detail points until you click a block or press Load Details.</div>`:""}<div class="layer-list">${project.files.map(f=>`<div class="layer-row"><span>${isTreeSpaceFile(f)?"Deferred detail: ":""}${escapeHtml(f.layerName||f.layerKey||f.type)}</span><b>${Number(f.count||0).toLocaleString()}</b></div>`).join("")}</div></div>`}).join("");if(!rebind)return;list.querySelectorAll("[data-toggle]").forEach(el=>{el.onclick=()=>el.closest(".project-card").classList.toggle("open")});list.querySelectorAll("[data-visible]").forEach(el=>{el.onclick=async()=>{const key=el.dataset.visible;state.visible.set(key,!state.visible.get(key));const project=state.projects.find(p=>p.key===key);await renderProject(project, state.detailLoaded.has(project.key));renderLegend();buildPanel()}});list.querySelectorAll("[data-details]").forEach(el=>{el.onclick=async()=>{const key=el.dataset.details,project=state.projects.find(p=>p.key===key);state.visible.set(key,true);await loadProject(project,true);await renderProject(project, state.detailLoaded.has(project.key));renderLegend();buildPanel();status("Details loaded for "+project.name)}});list.querySelectorAll("[data-zoom]").forEach(el=>{el.onclick=async()=>{const key=el.dataset.zoom,project=state.projects.find(p=>p.key===key);await loadProject(project,false);zoomProject(project)}})}
    function renderLegend(){const items=state.projects.filter(p=>state.visible.get(p.key));$("legend").innerHTML=items.map(p=>`<span class="legend-item"><span class="swatch" style="background:${p.color}"></span>${escapeHtml(p.name)}</span>`).join("")}
    function zoomProject(project){const loaded=state.loaded.get(project.key);if(!loaded)return;const features=[];for(const file of loaded.files)features.push(...file.features);if(!features.length)return;const b=L.geoJSON({type:"FeatureCollection",features}).getBounds();if(b.isValid())map.fitBounds(b.pad(.12))}
    function fitAll(){const features=[];for(const project of state.projects){if(!state.visible.get(project.key))continue;const loaded=state.loaded.get(project.key);if(!loaded)continue;for(const file of loaded.files){if(isTreeSpaceFile(file.meta))continue;features.push(...file.features)}}if(!features.length)return;const b=L.geoJSON({type:"FeatureCollection",features}).getBounds();if(b.isValid())map.fitBounds(b.pad(.08))}
    function setupControls(){$("panelBtn").onclick=()=>{$("panel").classList.toggle("collapsed");$("panelBtn").textContent=$("panel").classList.contains("collapsed")?"Open Layers":"Close Layers"};$("fitBtn").onclick=fitAll;$("satBtn").onclick=()=>{if(map.hasLayer(street))map.removeLayer(street);if(!map.hasLayer(satellite))satellite.addTo(map);$("satBtn").classList.add("active");$("streetBtn").classList.remove("active")};$("streetBtn").onclick=()=>{if(map.hasLayer(satellite))map.removeLayer(satellite);if(!map.hasLayer(street))street.addTo(map);$("streetBtn").classList.add("active");$("satBtn").classList.remove("active")};$("labelsBtn").onclick=()=>{state.showLabels=!state.showLabels;$("labelsBtn").classList.toggle("active",state.showLabels);renderLabels()};$("pointsBtn").onclick=async()=>{state.showPoints=!state.showPoints;$("pointsBtn").classList.toggle("active",state.showPoints);await renderVisible()};$("polysBtn").onclick=async()=>{state.showPolygons=!state.showPolygons;$("polysBtn").classList.toggle("active",state.showPolygons);await renderVisible()};$("linesBtn").onclick=async()=>{state.showLines=!state.showLines;$("linesBtn").classList.toggle("active",state.showLines);await renderVisible()};let searchTimer;$("search").oninput=e=>{clearTimeout(searchTimer);searchTimer=setTimeout(async()=>{state.query=e.target.value.trim();await renderVisible()},250)};map.on("zoomend",renderLabels)}
    async function init(){try{setupControls();state.manifest=await loadJson("data/map/manifest.json");state.projects=state.manifest.projects||[];for(const p of state.projects){state.visible.set(p.key,!!p.defaultVisible);state.labels.set(p.key,!!p.defaultLabels)}state.totalCoreFiles=state.projects.filter(p=>state.visible.get(p.key)).flatMap(p=>p.files.filter(isCoreFile)).length;buildPanel();renderLegend();const visible=state.projects.filter(p=>state.visible.get(p.key));await Promise.all(visible.map(p=>renderProject(p)));map.setView(START_CENTER,START_ZOOM);updateSubtitle();status("Fast map loaded at 4793 Garden Hwy. Details load only on click.",3500)}catch(err){console.error(err);$("subtitle").textContent="Map failed to load";status("Map failed: "+err.message,7000)}}
    init();
  </script>
