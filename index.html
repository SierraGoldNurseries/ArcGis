<script>
const $ = id => document.getElementById(id);

const DEFAULT_PROJECTS = {
  'Locations': { labelsDefault: true, visibleDefault: true, opacity: .26, pointMode: 'normal', color: '#0f766e' },
  'Structures': { labelsDefault: true, visibleDefault: true, opacity: .26, pointMode: 'normal', color: '#0f766e' },
  'Structures / Yards': { labelsDefault: true, visibleDefault: true, opacity: .26, pointMode: 'normal', color: '#0f766e' },
  'Chemical Locations': { labelsDefault: true, visibleDefault: true, opacity: .34, pointMode: 'normal', color: '#dc2626' },
  'Irrigation': { labelsDefault: false, visibleDefault: true, opacity: .30, pointMode: 'normal', color: '#0284c7' },
  'Owl Boxes': { labelsDefault: true, visibleDefault: true, opacity: .30, pointMode: 'normal', color: '#7c3aed' },
  'Prune North': { labelsDefault: false, visibleDefault: true, opacity: .22, pointMode: 'normal', color: '#ea580c' },
  'Prune South': { labelsDefault: false, visibleDefault: true, opacity: .22, pointMode: 'normal', color: '#f97316' },
  'Block #23': { labelsDefault: true, visibleDefault: true, opacity: .12, pointMode: 'normal', color: '#64748b' },
  'Block #25': { labelsDefault: true, visibleDefault: true, opacity: .12, pointMode: 'normal', color: '#475569' }
};

const LOCATION_PALETTE = [
  '#7c3aed',
  '#2563eb',
  '#0f766e',
  '#dc2626',
  '#ea580c',
  '#0891b2',
  '#16a34a',
  '#be185d',
  '#4f46e5',
  '#b45309',
  '#0e7490',
  '#9333ea',
  '#64748b',
  '#15803d',
  '#c026d3',
  '#0284c7'
];

const HARD_HIDE_PATTERNS = [
  /\bsolar\s*panels?\s*0?2\b/i,
  /\bsolar\s*panels?\s*0?3\b/i,
  /\bwater\s*treatment\b/i,
  /\boffice\b/i,
  /\blab\b/i
];

const state = {
  items: [],
  filtered: [],
  groups: new Map(),
  config: DEFAULT_PROJECTS,
  current: null,
  showPolys: true,
  showPoints: true,
  allLabels: true,
  shortLabels: false,
  base: 'sat',
  polys: null,
  points: null,
  clusters: null,
  labels: [],
  userMarker: null,

  // Per-location controls from the List tab.
  hiddenPolygons: new Set(),
  hiddenLabels: new Set()
};

function toast(t) {
  $('toast').textContent = t;
  $('toast').classList.add('show');
  clearTimeout($('toast')._t);
  $('toast')._t = setTimeout(() => $('toast').classList.remove('show'), 2600);
}

function clean(s) {
  return String(s || '')
    .replace(/_/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .replace(/\b\w/g, m => m.toUpperCase());
}

function norm(s) {
  return String(s || '')
    .toLowerCase()
    .replace(/_/g, ' ')
    .replace(/[^a-z0-9#]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function displayProject(name) {
  if (name === 'Structures / Yards' || name === 'Structures') return 'Locations';
  return name || 'Locations';
}

function visibleMeta(item) {
  return clean(item.layer);
}

function projectOf(p) {
  const raw = p._project || p.project || p.Project || 'Locations';
  if (raw === 'Structures / Yards' || raw === 'Structures') return 'Locations';
  return raw;
}

function sourceLayer(p) {
  return p._layer || p.layer || p.Layer || p.Name || p.name || 'Layer';
}

function featName(p) {
  return p.Name || p.name || p.Name_1 || p.Label || p.label || p._layer || p.layer || p.Layer || p.OBJECTID || p.FID || 'Location';
}

function acronym(s) {
  return String(s || '')
    .split(/[ _-]+/)
    .filter(Boolean)
    .map(x => x[0])
    .join('')
    .slice(0, 3)
    .toUpperCase() || 'LOC';
}

function badgeText(item) {
  const label = labelText(item);

  if (/^CY/i.test(label)) return 'CY';
  if (/^HT/i.test(label)) return 'HT';
  if (/^SH/i.test(label)) return 'SH';
  if (/^FB/i.test(label)) return 'FB';
  if (/^Zone/i.test(label)) return 'ZN';
  if (/^Head/i.test(label)) return 'HH';
  if (/^Block/i.test(label)) return 'BLK';

  return acronym(label);
}

function configFor(project) {
  return state.config[project] || DEFAULT_PROJECTS[project] || DEFAULT_PROJECTS['Locations'];
}

function labelsDefaultFor(project) {
  const c = configFor(project);
  return !!(c.labelsDefault ?? c.labels ?? false);
}

function visibleDefaultFor(project) {
  const c = configFor(project);
  return (c.visibleDefault ?? c.visible ?? true) !== false;
}

function opacityFor(project) {
  const c = configFor(project);
  return c.opacity ?? .25;
}

function pointModeFor(project) {
  const c = configFor(project);
  return c.pointMode || c.point_mode || 'normal';
}

function propertyValueBlob(props) {
  const vals = [];

  for (const [k, v] of Object.entries(props || {})) {
    if (v == null) continue;
    if (typeof v === 'string' || typeof v === 'number') vals.push(String(v));
  }

  return norm(vals.join(' '));
}

function itemBlob(item) {
  const p = item.feature?.properties || {};

  return norm([
    item.name,
    item.layer,
    item.project,
    p.Name,
    p.name,
    p.Name_1,
    p.Label,
    p.label,
    p._layer,
    p.layer,
    p.Layer
  ].filter(Boolean).join(' '));
}

function isHardHiddenText(text) {
  const n = norm(text);
  return HARD_HIDE_PATTERNS.some(rx => rx.test(n));
}

function isHardHiddenFeature(f) {
  return isHardHiddenText(propertyValueBlob(f.properties || {}));
}

function isHardHiddenItem(item) {
  return isHardHiddenText(itemBlob(item));
}

function isPolygonHidden(item) {
  return state.hiddenPolygons.has(item.key);
}

function isLabelHidden(item) {
  return state.hiddenLabels.has(item.key);
}

function groupKeyFor(project, layer, name) {
  let t = String(layer || name || '').replace(/\s+/g, '_');
  let m;

  if ((m = t.match(/^High_Tunnels?_(\d+)/i))) return `${project}|High_Tunnels_${m[1]}`;
  if ((m = t.match(/^Shade_?House_(\d+)/i)) || (m = t.match(/^Shadehouse_(\d+)/i))) return `${project}|Shade_House_${m[1]}`;
  if ((m = t.match(/^Can_Yard_(\d+)/i))) return `${project}|Can_Yard_${m[1]}`;
  if ((m = t.match(/^Four_?Bays?_(\d*)/i))) return `${project}|Four_Bays`;
  if ((m = t.match(/^Cold_Frame_(\d+)/i))) return `${project}|Cold_Frame`;
  if ((m = t.match(/^Block[_ #]*(\d+)/i))) return `${project}|Block_${m[1]}`;

  return `${project}|${t.replace(/_[A-Z]$/, '')}`;
}

function colorIndexFrom(text) {
  let h = 0;
  for (const ch of String(text || '')) h = ((h << 5) - h + ch.charCodeAt(0)) >>> 0;
  return h % LOCATION_PALETTE.length;
}

function colorFor(item) {
  // Always give each location/group its own color.
  if (
    item.project === 'Locations' ||
    item.project === 'Structures' ||
    item.project === 'Structures / Yards'
  ) {
    return LOCATION_PALETTE[colorIndexFrom(item.groupKey || item.layer || item.name)];
  }

  const explicit = configFor(item.project).color;
  return explicit || LOCATION_PALETTE[colorIndexFrom(item.groupKey || item.project)];
}

function labelText(item) {
  const props = item.feature?.properties || {};

  let raw = [
    props._short_label,
    props.ShortLabel,
    props.short_label,
    props.Label,
    props.label,
    props.Name,
    props.name,
    props.Name_1,
    item.name,
    item.layer
  ].filter(Boolean).join(' ');

  let t = String(raw || '')
    .replace(/_/g, ' ')
    .replace(/\bstructures?\b/gi, '')
    .replace(/\byards?\b/gi, '')
    .replace(/\blocations?\b/gi, '')
    .replace(/\b(acres?|acreage|ac|area|sqft|square feet)\b/gi, '')
    .replace(/\bAures\b/gi, '')
    .replace(/\s+/g, ' ')
    .trim();

  let m;

  if ((m = t.match(/\bCY\s*0?(\d{1,2})\s*[- ]?([A-Z])?/i))) {
    return 'CY' + String(m[1]).padStart(2, '0') + (m[2] ? m[2].toUpperCase() : '');
  }

  if ((m = t.match(/\bCan\s*Yard\s*0?(\d{1,2})\s*[- ]?([A-Z])?/i))) {
    return 'CY' + String(m[1]).padStart(2, '0') + (m[2] ? m[2].toUpperCase() : '');
  }

  if ((m = t.match(/\bHT\s*0?(\d{1,2})\s*[- ]?([A-Z])?/i))) {
    return 'HT' + String(m[1]).padStart(2, '0') + (m[2] ? m[2].toUpperCase() : '');
  }

  if ((m = t.match(/\bHigh\s*Tunnels?\s*0?(\d{1,2})\s*[- ]?([A-Z])?/i))) {
    return 'HT' + String(m[1]).padStart(2, '0') + (m[2] ? m[2].toUpperCase() : '');
  }

  if ((m = t.match(/\bSH\s*0?(\d{1,2})\s*[- ]?([A-Z])?/i))) {
    return 'SH' + String(m[1]).padStart(2, '0') + (m[2] ? '-' + m[2].toUpperCase() : '');
  }

  if ((m = t.match(/\bShade\s*House\s*0?(\d{1,2})\s*[- ]?([A-Z])?/i)) || (m = t.match(/\bShadehouse\s*0?(\d{1,2})\s*[- ]?([A-Z])?/i))) {
    return 'SH' + String(m[1]).padStart(2, '0') + (m[2] ? '-' + m[2].toUpperCase() : '');
  }

  if ((m = t.match(/\bFB\s*0?(\d{1,2})/i))) {
    return 'FB' + String(m[1]).padStart(2, '0');
  }

  if ((m = t.match(/\bFour\s*Bays?\s*0?(\d{1,2})/i))) {
    return 'FB' + String(m[1]).padStart(2, '0');
  }

  if ((m = t.match(/\bZone\s*0?(\d{1,2})/i))) {
    return 'Zone ' + String(m[1]).padStart(2, '0');
  }

  if ((m = t.match(/\bHead\s*House\s*0?(\d{1,2})/i))) {
    return 'Head House ' + String(m[1]).padStart(2, '0');
  }

  if ((m = t.match(/\bBlock\s*#?\s*(\d+)/i))) {
    return 'Block ' + m[1];
  }

  t = t
    .replace(/\bstructures?\b/gi, '')
    .replace(/\byards?\b/gi, '')
    .replace(/\blocations?\b/gi, '')
    .replace(/\s+/g, ' ')
    .trim();

  return state.shortLabels ? acronym(t) : clean(t);
}

function centerOf(f) {
  try {
    const pt = turf.pointOnFeature(f);
    return [pt.geometry.coordinates[1], pt.geometry.coordinates[0]];
  } catch (e) {
    const g = f.geometry;
    if (g && g.type === 'Point') return [g.coordinates[1], g.coordinates[0]];
    return null;
  }
}

function areaOf(f) {
  try {
    return turf.area(f);
  } catch (e) {
    return 0;
  }
}

function normalizeFeature(f, i) {
  const p = f.properties || {};
  const project = projectOf(p);
  const layer = sourceLayer(p);
  const name = featName(p);
  const center = centerOf(f);
  const groupKey = groupKeyFor(project, layer, name);

  return {
    key: p._feature_key || `${project}|${layer}|${p.OBJECTID || p.FID || i}`,
    project,
    layer,
    name,
    feature: f,
    center,
    groupKey,
    geom: f.geometry?.type || 'Unknown',
    area: areaOf(f)
  };
}

function groupVisible(item) {
  const g = state.groups.get(item.project);
  return !!g?.visible;
}

function polygonItems() {
  return state.filtered.filter(i => {
    if (isHardHiddenItem(i)) return false;
    if (!groupVisible(i)) return false;
    if (isPolygonHidden(i)) return false;
    return true;
  });
}

function labelItems() {
  return state.filtered.filter(i => {
    if (isHardHiddenItem(i)) return false;
    if (!groupVisible(i)) return false;
    if (isLabelHidden(i)) return false;
    return true;
  });
}

const map = L.map('map', { preferCanvas: true }).setView([36.78, -119.42], 16);

const street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 22,
  crossOrigin: true,
  attribution: '&copy; OpenStreetMap'
});

const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxNativeZoom: 19,
  maxZoom: 22,
  crossOrigin: true,
  attribution: 'Tiles &copy; Esri'
}).addTo(map);

function style(item, sel = false) {
  const c = colorFor(item);
  let fillOpacity = opacityFor(item.project);

  if (item.project.startsWith('Block')) fillOpacity = .11;

  return {
    color: c,
    weight: sel ? 4 : 2,
    fillColor: c,
    fillOpacity
  };
}

function loadJson(path) {
  return fetch(path + '?v=' + Date.now(), { cache: 'no-store' }).then(async r => {
    if (!r.ok) throw new Error(path + ' ' + r.status);

    const txt = await r.text();

    try {
      return JSON.parse(txt);
    } catch (e) {
      throw new Error(path + ' returned non-JSON');
    }
  });
}

async function loadFirst(paths) {
  let lastErr;

  for (const path of paths) {
    try {
      return await loadJson(path);
    } catch (e) {
      lastErr = e;
    }
  }

  throw lastErr;
}

async function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations()
      .then(regs => regs.forEach(r => r.unregister()))
      .catch(() => {});
  }

  const polys = await loadFirst([
    '/data/combined_polygons.geojson',
    'data/combined_polygons.geojson',
    '/data/structures_polygons.geojson',
    'data/structures_polygons.geojson'
  ]);

  try {
    const cfg = await loadFirst([
      '/data/map_config.json',
      'data/map_config.json'
    ]);

    if (cfg.projects) state.config = { ...DEFAULT_PROJECTS, ...cfg.projects };
  } catch (e) {}

  state.items = (polys.features || [])
    .filter(f => !isHardHiddenFeature(f))
    .map(normalizeFeature)
    .filter(x => x.center)
    .filter(x => !isHardHiddenItem(x));

  buildGroups();
  applyFilter();
  fitAll();
}

function buildGroups() {
  state.groups.clear();

  for (const item of state.items) {
    if (!state.groups.has(item.project)) {
      state.groups.set(item.project, {
        name: item.project,
        items: [],
        visible: visibleDefaultFor(item.project),
        labels: labelsDefaultFor(item.project),
        layers: new Map()
      });
    }

    const g = state.groups.get(item.project);
    g.items.push(item);

    if (!g.layers.has(item.layer)) g.layers.set(item.layer, 0);
    g.layers.set(item.layer, g.layers.get(item.layer) + 1);
  }
}

function renderProjects() {
  let html = '';

  for (const g of [...state.groups.values()].sort((a, b) => displayProject(a.name).localeCompare(displayProject(b.name)))) {
    const sample = g.items.find(i => !isHardHiddenItem(i));
    if (!sample) continue;

    const c = configFor(g.name).color || colorFor(sample);
    const shownCount = g.items.filter(i => !isHardHiddenItem(i) && !isPolygonHidden(i)).length;

    html += `
      <div class="project" data-project="${g.name}">
        <div class="phead">
          <span class="sw" style="background:${c}"></span>
          <div class="pname">${displayProject(g.name)}</div>
          <span class="badge">${shownCount}</span>
        </div>
        <div class="pactions">
          <button class="${g.visible ? 'on' : ''}" data-vis="${g.name}">Visible</button>
          <button class="${g.labels ? 'on' : ''}" data-lab="${g.name}">Labels</button>
          <button data-zoom="${g.name}">Zoom</button>
        </div>
        <div class="plist">
          ${[...g.layers.entries()].sort().map(([l, n]) => `<div class="layerrow"><span>${clean(l)}</span><small>${n}</small></div>`).join('')}
        </div>
      </div>
    `;
  }

  $('projects').innerHTML = html;

  $('projects').querySelectorAll('[data-project]').forEach(el => {
    el.querySelector('.phead').onclick = () => el.classList.toggle('open');
  });

  $('projects').querySelectorAll('[data-vis]').forEach(b => {
    b.onclick = e => {
      e.stopPropagation();
      const g = state.groups.get(b.dataset.vis);
      g.visible = !g.visible;
      renderProjects();
      renderMap();
      renderLabels();
      renderStats();
    };
  });

  $('projects').querySelectorAll('[data-lab]').forEach(b => {
    b.onclick = e => {
      e.stopPropagation();
      const g = state.groups.get(b.dataset.lab);
      g.labels = !g.labels;
      renderProjects();
      renderLabels();
    };
  });

  $('projects').querySelectorAll('[data-zoom]').forEach(b => {
    b.onclick = e => {
      e.stopPropagation();
      zoomProject(b.dataset.zoom);
    };
  });
}

function renderList() {
  const rows = state.filtered.slice(0, 1000).map(item => {
    const polyOn = !isPolygonHidden(item);
    const labelOn = !isLabelHidden(item);

    return `
      <div class="item" data-key="${item.key}" style="${polyOn ? '' : 'opacity:.55;'}">
        <div style="display:grid;grid-template-columns:1fr;gap:3px;align-items:center;justify-items:center;flex:0 0 auto;">
          <label title="Polygon / marker" style="font-size:10px;font-weight:950;display:flex;align-items:center;gap:3px;cursor:pointer;">
            <input
              type="checkbox"
              data-poly-item="${item.key}"
              ${polyOn ? 'checked' : ''}
              onclick="event.stopPropagation();"
              style="width:16px;height:16px;accent-color:${colorFor(item)};"
            >
            P
          </label>
          <label title="Label" style="font-size:10px;font-weight:950;display:flex;align-items:center;gap:3px;cursor:pointer;">
            <input
              type="checkbox"
              data-label-item="${item.key}"
              ${labelOn ? 'checked' : ''}
              onclick="event.stopPropagation();"
              style="width:16px;height:16px;accent-color:${colorFor(item)};"
            >
            L
          </label>
        </div>

        <div class="ib" style="background:${colorFor(item)}">${badgeText(item)}</div>

        <div class="it">
          <b>${labelText(item)}</b>
          <small>${visibleMeta(item)}</small>
        </div>
      </div>
    `;
  }).join('');

  $('list').innerHTML = rows || '<div class="note">No results.</div>';

  $('list').querySelectorAll('[data-key]').forEach(r => {
    r.onclick = e => {
      if (e.target.matches('[data-poly-item]') || e.target.matches('[data-label-item]')) return;

      const item = state.items.find(x => x.key === r.dataset.key);
      if (!isPolygonHidden(item)) openItem(item);
    };
  });

  $('list').querySelectorAll('[data-poly-item]').forEach(cb => {
    cb.onchange = () => {
      const key = cb.dataset.polyItem;

      if (cb.checked) state.hiddenPolygons.delete(key);
      else state.hiddenPolygons.add(key);

      if (state.current && state.current.key === key && state.hiddenPolygons.has(key)) {
        $('drawer').classList.remove('open');
        state.current = null;
      }

      renderList();
      renderProjects();
      renderMap();
      renderLabels();
      renderStats();
    };
  });

  $('list').querySelectorAll('[data-label-item]').forEach(cb => {
    cb.onchange = () => {
      const key = cb.dataset.labelItem;

      if (cb.checked) state.hiddenLabels.delete(key);
      else state.hiddenLabels.add(key);

      renderList();
      renderLabels();
      renderStats();
    };
  });
}

function renderPills() {
  $('pillbar').innerHTML = [...state.groups.values()]
    .sort((a, b) => displayProject(a.name).localeCompare(displayProject(b.name)))
    .map(g => {
      const sample = g.items.find(i => !isHardHiddenItem(i));
      if (!sample) return '';

      const c = configFor(g.name).color || colorFor(sample);
      const count = g.items.filter(i => !isHardHiddenItem(i) && !isPolygonHidden(i)).length;

      return `<span class="pill"><i class="dot" style="background:${c}"></i>${displayProject(g.name)} <small>${count}</small></span>`;
    })
    .join('');
}

function renderMap() {
  if (state.polys) map.removeLayer(state.polys);
  if (state.points) map.removeLayer(state.points);
  if (state.clusters) map.removeLayer(state.clusters);

  const visible = polygonItems();

  const fc = {
    type: 'FeatureCollection',
    features: visible.map(i => i.feature)
  };

  state.polys = L.geoJSON(fc, {
    style: f => {
      const item = state.items.find(x => x.feature === f) || normalizeFeature(f, 0);
      return style(item, state.current?.key === item.key);
    },
    onEachFeature: (f, layer) => {
      const item = state.items.find(x => x.feature === f) || normalizeFeature(f, 0);

      layer.on('click', () => openItem(item));

      layer.bindPopup(`
        <b>${labelText(item)}</b>
        <div class="popup-grid">
          <b>Layer</b><span>${clean(item.layer)}</span>
        </div>
      `);
    }
  });

  if (state.showPolys) state.polys.addTo(map);

  const normal = L.layerGroup();
  const cluster = L.markerClusterGroup({
    disableClusteringAtZoom: 19,
    spiderfyOnMaxZoom: true
  });

  for (const item of visible) {
    const marker = L.circleMarker(item.center, {
      radius: 7,
      color: '#fff',
      weight: 2,
      fillColor: colorFor(item),
      fillOpacity: 1
    });

    marker.on('click', () => openItem(item));

    if (pointModeFor(item.project) === 'cluster') cluster.addLayer(marker);
    else normal.addLayer(marker);
  }

  state.points = normal;
  state.clusters = cluster;

  if (state.showPoints) {
    normal.addTo(map);
    cluster.addTo(map);
  }

  renderLabels();
  renderStats();
}

function renderLabels() {
  for (const m of state.labels) map.removeLayer(m);
  state.labels = [];

  const used = new Set();

  for (const item of labelItems()) {
    const g = state.groups.get(item.project);
    if (!(state.allLabels || g.labels || state.current?.key === item.key)) continue;

    const txt = labelText(item);
    if (!txt) continue;

    const key = item.project + '|' + txt + '|' + Math.round(item.center[0] * 100000) + '|' + Math.round(item.center[1] * 100000);
    if (used.has(key)) continue;
    used.add(key);

    let cls = item.area > 3000 ? 'label' : 'label small';
    if (item.area < 800) cls = 'label tiny';

    const icon = L.divIcon({
      className: '',
      html: `<div class="${cls}">${txt}</div>`
    });

    const mk = L.marker(item.center, {
      icon,
      interactive: false,
      keyboard: false
    }).addTo(map);

    state.labels.push(mk);
  }
}

function renderStats() {
  const shown = polygonItems().length;

  $('featureStat').textContent = `${state.items.length.toLocaleString()} features`;
  $('shownStat').textContent = `${shown.toLocaleString()} shown`;
  $('sub').textContent = `${shown.toLocaleString()} features loaded`;
  $('labelStat').textContent = state.allLabels ? 'all labels' : 'defaults';
}

function applyFilter() {
  const q = $('search').value.trim().toLowerCase();

  state.filtered = state.items.filter(i => {
    if (isHardHiddenItem(i)) return false;
    if (!q) return true;

    return [displayProject(i.project), i.layer, i.name, labelText(i)]
      .join(' ')
      .toLowerCase()
      .includes(q);
  });

  renderProjects();
  renderList();
  renderMap();
  renderPills();
  showSuggestions();
}

function showSuggestions() {
  const q = $('search').value.trim().toLowerCase();
  const box = $('suggest');

  if (!q) {
    box.classList.remove('show');
    return;
  }

  const matches = state.items
    .filter(i => !isHardHiddenItem(i))
    .filter(i => !isPolygonHidden(i))
    .filter(i => [displayProject(i.project), i.layer, i.name, labelText(i)].join(' ').toLowerCase().includes(q))
    .slice(0, 8);

  box.innerHTML = matches.map(i => `
    <div class="sug" data-key="${i.key}">
      ${labelText(i)}
      <small>${visibleMeta(i)}</small>
    </div>
  `).join('');

  box.classList.toggle('show', matches.length > 0);

  box.querySelectorAll('[data-key]').forEach(r => {
    r.onclick = () => {
      const it = state.items.find(x => x.key === r.dataset.key);
      $('suggest').classList.remove('show');
      if (!isPolygonHidden(it)) openItem(it);
    };
  });
}

function openItem(item) {
  if (!item || isHardHiddenItem(item) || isPolygonHidden(item)) return;

  state.current = item;

  $('drawer').classList.add('open');
  $('dTitle').textContent = labelText(item);
  $('dSub').textContent = visibleMeta(item);

  $('dDetails').innerHTML = `
    <b>Layer</b><span>${clean(item.layer)}</span>
    <b>Geometry</b><span>${item.geom}</span>
    <b>Area</b><span>${item.area ? ((item.area * 0.000247105).toFixed(2) + ' ac') : '—'}</span>
    <b>Coords</b><span>${item.center[0].toFixed(6)}, ${item.center[1].toFixed(6)}</span>
    <b>Color group</b><span>${clean(item.groupKey.split('|')[1])}</span>
  `;

  map.flyTo(item.center, Math.max(map.getZoom(), 18), { duration: .5 });

  if (state.polys) {
    state.polys.setStyle(f => style(
      state.items.find(x => x.feature === f) || normalizeFeature(f, 0),
      state.current?.feature === f
    ));
  }

  renderLabels();
}

function zoomProject(name) {
  const items = state.items.filter(i => i.project === name && !isPolygonHidden(i) && !isHardHiddenItem(i));

  const b = L.geoJSON({
    type: 'FeatureCollection',
    features: items.map(i => i.feature)
  }).getBounds();

  if (b.isValid()) map.fitBounds(b.pad(.14));
}

function fitAll() {
  const b = L.geoJSON({
    type: 'FeatureCollection',
    features: polygonItems().map(i => i.feature)
  }).getBounds();

  if (b.isValid()) map.fitBounds(b.pad(.12));
}

function setBase(which) {
  state.base = which;

  if (which === 'street') {
    map.removeLayer(sat);
    street.addTo(map);
  } else {
    map.removeLayer(street);
    sat.addTo(map);
  }

  $('satBtn').classList.toggle('on', which === 'sat');
  $('streetBtn').classList.toggle('on', which === 'street');
}

$('panelToggle').onclick = () => $('side').classList.toggle('collapsed');
$('openSide').onclick = () => $('side').classList.remove('collapsed');
$('fitBtn').onclick = fitAll;
$('search').oninput = applyFilter;
$('search').onfocus = showSuggestions;

$('satBtn').onclick = () => setBase('sat');
$('streetBtn').onclick = () => setBase('street');

$('polyBtn').onclick = () => {
  state.showPolys = !state.showPolys;
  $('polyBtn').classList.toggle('on', state.showPolys);
  renderMap();
};

$('pointBtn').onclick = () => {
  state.showPoints = !state.showPoints;
  $('pointBtn').classList.toggle('on', state.showPoints);
  renderMap();
};

$('allLabelsBtn').onclick = () => {
  state.allLabels = !state.allLabels;
  $('allLabelsBtn').classList.toggle('on', state.allLabels);
  renderLabels();
  renderStats();
};

$('shortBtn').onclick = () => {
  state.shortLabels = !state.shortLabels;
  $('shortBtn').classList.toggle('on', state.shortLabels);
  renderLabels();
  renderList();
};

$('closeDrawer').onclick = () => $('drawer').classList.remove('open');

$('zoomBtn').onclick = () => {
  if (state.current) map.setView(state.current.center, 20);
};

$('gmapBtn').onclick = () => {
  if (state.current) open(`https://www.google.com/maps?q=${state.current.center[0]},${state.current.center[1]}`, '_blank');
};

$('amapBtn').onclick = () => {
  if (state.current) open(`https://maps.apple.com/?ll=${state.current.center[0]},${state.current.center[1]}`, '_blank');
};

$('coordBtn').onclick = async () => {
  if (state.current) {
    await navigator.clipboard.writeText(`${state.current.center[0].toFixed(6)}, ${state.current.center[1].toFixed(6)}`);
    toast('Coordinates copied');
  }
};

$('clearBtn').onclick = () => {
  $('search').value = '';
  applyFilter();
};

$('copyBtn').onclick = async () => {
  const c = map.getCenter();
  await navigator.clipboard.writeText(`${location.origin}${location.pathname}#${map.getZoom()}/${c.lat.toFixed(6)}/${c.lng.toFixed(6)}`);
  toast('Map view copied');
};

$('gpsBtn').onclick = () => {
  if (!navigator.geolocation) return toast('GPS not available');

  navigator.geolocation.getCurrentPosition(
    p => {
      const ll = [p.coords.latitude, p.coords.longitude];

      if (state.userMarker) map.removeLayer(state.userMarker);

      state.userMarker = L.marker(ll, {
        icon: L.divIcon({
          className: '',
          html: '<div class="locdot"></div>'
        })
      }).addTo(map);

      map.setView(ll, 18);
    },
    () => toast('Unable to get GPS')
  );
};

document.querySelectorAll('.tab').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.pane').forEach(x => x.classList.remove('on'));

    b.classList.add('on');
    $(b.dataset.tab).classList.add('on');
  };
});

document.addEventListener('click', e => {
  if (!e.target.closest('#suggest') && !e.target.closest('#search')) {
    $('suggest').classList.remove('show');
  }
});

init().catch(e => {
  console.error(e);
  $('sub').textContent = 'Map data failed to load';
  toast(e.message);
});
</script>
