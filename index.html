<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Basic Facility Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    body { font-family: Arial, Helvetica, sans-serif; }
    .leaflet-container { background: #111; }
    .block-label {
      color: #071a35;
      font-weight: 800;
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
      text-align: center;
      text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff, 0 0 4px #fff;
      pointer-events: none;
    }
    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 999;
      background: rgba(255,255,255,.92);
      border-radius: 10px;
      padding: 8px 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      font-size: 13px;
    }
    .panel b { display:block; margin-bottom:3px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel"><b>Basic Facility Map</b>Blocks only. No tree plots.</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Basic static map: no external GeoJSON files are loaded, so GitHub Pages works without /data/optimized files.
    // Main facility start view: 4793 Garden Hwy, Yuba City, CA 95991 area.
    const FACILITY_BOUNDS = {
      north: 39.10510,
      south: 39.10005,
      west: -121.63970,
      east: -121.63145
    };

    function ll(x, y) {
      const lat = FACILITY_BOUNDS.north - y * (FACILITY_BOUNDS.north - FACILITY_BOUNDS.south);
      const lng = FACILITY_BOUNDS.west + x * (FACILITY_BOUNDS.east - FACILITY_BOUNDS.west);
      return [lat, lng];
    }

    function rect(label, x1, y1, x2, y2, color) {
      const bounds = [ll(x1, y2), ll(x2, y1)];
      const poly = L.rectangle(bounds, {
        color: '#18345b',
        weight: 2,
        fillColor: color,
        fillOpacity: 0.42
      }).addTo(blockLayer);
      poly.bindTooltip(label, {
        permanent: true,
        direction: 'center',
        className: 'block-label',
        opacity: 1
      });
      poly.bindPopup('<b>' + label + '</b>');
      return poly;
    }

    const map = L.map('map', { zoomControl: true, preferCanvas: true });

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 22,
      attribution: 'Tiles &copy; Esri'
    }).addTo(map);

    const blockLayer = L.layerGroup().addTo(map);

    const blocks = [
      ['CY01-A', .06,.07,.26,.14,'#39a7d8'], ['CY01-B', .26,.07,.43,.14,'#33c1a3'],
      ['CY01-C', .06,.14,.26,.22,'#b7c86b'], ['CY01-D', .26,.14,.43,.22,'#8d704d'],
      ['CY02-A', .07,.23,.28,.29,'#62a9d4'], ['CY02-B', .28,.23,.43,.29,'#65c586'],
      ['CY02-C', .07,.29,.26,.36,'#95a947'], ['CY02-D', .26,.29,.43,.36,'#bd8a72'],

      ['HH03', .06,.38,.17,.50,'#d9f38d'], ['ZN10', .17,.38,.24,.50,'#c7ef81'],
      ['ZN09', .24,.38,.31,.50,'#bde56f'], ['ZN08', .31,.38,.38,.50,'#d7f28a'],
      ['ZN07', .38,.38,.45,.50,'#e7f6a2'], ['ZN06', .45,.37,.49,.44,'#cceda0'],
      ['ZN05', .45,.44,.49,.50,'#a6dc6e'],

      ['SH03-W', .06,.53,.27,.76,'#178f79'], ['SH03-E', .27,.53,.43,.76,'#2f9f81'],
      ['SH04-W', .06,.79,.27,.97,'#249b87'], ['SH04-E', .27,.79,.43,.97,'#4aa88e'],

      ['HT05-A', .47,.07,.64,.14,'#a9d4ef'], ['HT05-B', .64,.07,.81,.14,'#94e7c2'],
      ['SH05', .81,.07,.84,.22,'#42a983'],
      ['HT05-C', .47,.14,.64,.22,'#f0dd96'], ['HT05-D', .64,.14,.81,.22,'#efb9ad'],
      ['HT06-A', .47,.24,.64,.32,'#b7daf0'], ['HT06-B', .64,.24,.81,.32,'#99e3bc'],
      ['HT06-C', .47,.32,.64,.41,'#efd891'], ['HT06-D', .64,.32,.78,.41,'#edafa8'],

      ['FB01', .47,.44,.52,.49,'#62b7c8'], ['FB02', .52,.44,.57,.49,'#79bfd0'],
      ['FB03', .57,.44,.62,.49,'#67b0c6'], ['FB04', .62,.44,.68,.49,'#83c6d6'],
      ['FB05', .68,.44,.74,.49,'#78bace'], ['FB06', .74,.44,.78,.49,'#87cddd'],

      ['CF09', .47,.52,.49,.55,'#f0b35f'], ['CF07', .49,.52,.52,.55,'#efc468'],
      ['MT01', .52,.51,.62,.54,'#e3c277'], ['MT02', .52,.54,.62,.57,'#d7b05e'],
      ['ZN03', .62,.51,.71,.54,'#d7ed92'], ['ZN02', .62,.54,.71,.57,'#c7e989'], ['ZN04', .71,.51,.77,.57,'#e4f1a2'],
      ['HH01', .55,.57,.62,.64,'#d6ed9f'], ['Soil', .52,.57,.55,.64,'#cfe5dc'], ['Bunker', .62,.57,.71,.64,'#c5e681'],

      ['Pond', .44,.78,.54,.97,'#189a8f'], ['CY08', .55,.78,.63,.97,'#74c7c4'],
      ['Solar01', .65,.79,.70,.90,'#c49a32'], ['Shop', .63,.72,.67,.76,'#d8d8d8']
    ];

    blocks.forEach(b => rect(...b));

    const fullBounds = [ll(0.04, 0.99), ll(0.86, 0.05)];
    map.fitBounds(fullBounds, { padding: [24, 24] });

    L.control.layers(null, { 'Blocks': blockLayer }, { collapsed: false }).addTo(map);
  </script>
</body>
</html>
