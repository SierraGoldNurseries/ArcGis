<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SGN Map App - Basic Blocks</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--border:#d8e0ec;--text:#0f172a;--muted:#64748b;--shadow:0 12px 32px rgba(15,23,42,.14);--brand:#0f766e}*{box-sizing:border-box}html,body,#map{height:100%;margin:0}body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);overflow:hidden;background:#eaf0f8}#map{width:100%;height:100%}.topbar{position:absolute;left:12px;right:12px;top:12px;z-index:1000;display:flex;align-items:center;gap:10px;pointer-events:none}.brand{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.95);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:20px;padding:8px 12px;pointer-events:auto}.logo{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#0f766e);color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center;font-size:13px}.brand-title{font-weight:900;font-size:16px;line-height:1.05}.brand-sub{color:var(--muted);font-size:12px;font-weight:700;margin-top:2px}.top-actions{margin-left:auto;display:flex;gap:8px;pointer-events:auto;flex-wrap:wrap}button,.button-link{border:1px solid var(--border);background:#fff;color:#0f172a;border-radius:14px;padding:10px 12px;font-weight:900;cursor:pointer;box-shadow:0 6px 16px rgba(15,23,42,.09);text-decoration:none;font-size:13px;white-space:nowrap}button.primary,.button-link.primary{background:#0f766e;color:#fff;border-color:#0f766e}button.active{background:#ecfeff;border-color:#67e8f9;color:#155e75}.panel{position:absolute;left:12px;top:76px;bottom:14px;width:410px;z-index:1000;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:22px;overflow:hidden;display:flex;flex-direction:column;transition:transform .22s ease,opacity .22s ease}.panel.collapsed{transform:translateX(calc(-100% - 20px));opacity:.15;pointer-events:none}.panel-head{padding:14px;border-bottom:1px solid var(--border)}.search{width:100%;height:42px;border:1px solid var(--border);border-radius:14px;padding:0 12px;font-weight:800;outline:none}.quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.quick button{box-shadow:none;padding:10px 8px;font-size:12px}.panel-body{overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}.hint{font-size:12px;color:#475569;font-weight:700;line-height:1.35;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px 12px}.hint b{color:#0f172a}.block-list{display:flex;flex-direction:column;gap:8px}.block-row{display:flex;gap:8px;align-items:center;padding:10px;border:1px solid #e2e8f0;border-radius:14px;background:#fff}.block-row span{font-weight:900;flex:1}.block-row small{color:#64748b;font-weight:800}.check{display:flex;align-items:center;gap:8px;flex:1}.check input{width:16px;height:16px}.swatch{width:14px;height:14px;border-radius:4px;border:1px solid #0f172a66}.label{color:#0f172a;font-weight:950;font-size:12px;white-space:nowrap;background:rgba(255,255,255,.9);border:1px solid rgba(15,23,42,.15);border-radius:5px;padding:2px 5px;box-shadow:0 1px 4px rgba(15,23,42,.15);transform:translate(-50%,-50%);pointer-events:none;line-height:1.05;text-align:center}.status{position:absolute;left:50%;transform:translateX(-50%);bottom:16px;z-index:1000;background:rgba(15,23,42,.92);color:#fff;border-radius:999px;padding:9px 12px;font-weight:800;font-size:12px;box-shadow:var(--shadow);display:none}.status.show{display:block}.leaflet-popup-content{font-weight:800}@media(max-width:800px){.brand-sub{display:none}.panel{width:min(410px,calc(100vw - 20px));top:70px}.top-actions{gap:5px}button,.button-link{padding:9px 10px;font-size:12px}}
</style>
</head>
<body>
<div id="map"></div>
<div class="topbar"><div class="brand"><div class="logo">SGN</div><div><div class="brand-title">SGN Map App</div><div id="subtitle" class="brand-sub">Basic embedded blocks · no points/tree plots</div></div></div><div class="top-actions"><button id="panelBtn">Close Layers</button><button id="fitBtnTop">Fit Main Site</button><a class="button-link primary" href="./import.html">Admin / Import</a></div></div>
<aside id="panel" class="panel"><div class="panel-head"><input id="search" class="search" placeholder="Search block / layer name..." /><div class="quick"><button id="satBtn" class="active">Satellite</button><button id="streetBtn">Street</button><button id="fitBtn">Fit Main Site</button><button id="labelsBtn" class="active">Labels</button></div></div><div class="panel-body"><div class="hint"><b>Basic mode:</b> this file does not load missing GeoJSON/LFS files, point files, or tree plots. Blocks are embedded so GitHub Pages loads immediately.</div><div id="blockList" class="block-list"></div></div></aside>
<div id="status" class="status"></div>
<script>
const DEFAULT_VIEW=[39.0714,-121.6136];
const $=id=>document.getElementById(id);
const map=L.map('map',{zoomControl:true,preferCanvas:true,renderer:L.canvas({padding:.35})}).setView(DEFAULT_VIEW,17);
const satellite=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxNativeZoom:19,maxZoom:22,attribution:'Tiles © Esri'}).addTo(map);
const street=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:22,attribution:'© OpenStreetMap'});
const COLORS=['#38bdf8','#34d399','#facc15','#fb923c','#93c5fd','#86efac','#fde68a','#fca5a5','#bef264','#d9f99d','#ecfccb','#fef08a','#06b6d4','#67e8f9','#99f6e4','#5eead4','#fbbf24','#a7f3d0','#ddd6fe','#c4b5fd','#e9d5ff','#f0abfc','#f9a8d4','#fda4af','#a3e635','#84cc16','#eab308','#14b8a6','#2dd4bf','#0ea5e9','#f59e0b','#22c55e','#64748b','#94a3b8'];
const names=['CY01-A','CY01-B','CY01-C','CY01-D','CY02-A','CY02-B','CY02-C','CY02-D','HH03','ZN10','ZN09','ZN08','ZN07','ZN06','ZN05','HT05-A','HT05-B','HT05-C','HT05-D','SH05','HT06-A','HT06-B','HT06-C','HT06-D','FB01','FB02','FB03','FB04','FB05','FB06','CF06','CF07','MT01','MT02','ZN03','ZN02','ZN04','Soil','HH01','Bunker','SH03-W','SH03-E','SH04-W','SH04-E','Pond','CY08','Shop','Solar01'];
function r(name,x1,y1,x2,y2){return {name,x1,y1,x2,y2,color:COLORS[names.indexOf(name)%COLORS.length],visible:true,layer:null,label:null}}
const blocks=[
r('CY01-A',0,0,23,8),r('CY01-B',23,0,43,8),r('CY01-C',0,8,23,17),r('CY01-D',23,8,43,17),
r('CY02-A',1,18,25,25),r('CY02-B',25,18,43,25),r('CY02-C',1,25,23,33),r('CY02-D',23,25,43,33),
r('HH03',0,35,13,49),r('ZN10',13,35,21,49),r('ZN09',21,35,29,49),r('ZN08',29,35,37,49),r('ZN07',37,35,45,49),r('ZN06',45,34,49,42),r('ZN05',45,42,49,49),
r('HT05-A',53,0,66,8),r('HT05-B',66,0,91,8),r('HT05-C',53,8,73,17),r('HT05-D',73,8,87,17),r('SH05',87,0,91,17),
r('HT06-A',53,19,72,28),r('HT06-B',72,19,87,28),r('HT06-C',53,28,72,39),r('HT06-D',72,28,84,39),
r('FB01',54,43,58,48),r('FB02',58,43,64,48),r('FB03',64,43,69,48),r('FB04',69,43,76,48),r('FB05',76,43,82,48),r('FB06',82,43,87,48),
r('CF06',52,50,55,54),r('CF07',55,50,58,54),r('MT01',61,49,72,54),r('MT02',61,54,72,59),r('ZN03',72,49,80,54),r('ZN02',72,54,80,59),r('ZN04',80,49,86,59),r('Soil',61,59,65,67),r('HH01',65,59,73,67),r('Bunker',73,59,80,67),
r('SH03-W',0,53,25,78),r('SH03-E',25,53,43,78),r('SH04-W',0,82,25,100),r('SH04-E',25,82,43,100),r('Pond',44,81,52,100),r('CY08',54,81,64,100),r('Shop',69,74,74,79),r('Solar01',76,82,82,93)
];
const baseLat=39.07425, baseLng=-121.6208, latSpan=.0108, lngSpan=.0174;
function bounds(b){const lat1=baseLat-(b.y2/100)*latSpan, lat2=baseLat-(b.y1/100)*latSpan, lng1=baseLng+(b.x1/100)*lngSpan, lng2=baseLng+(b.x2/100)*lngSpan;return [[lat1,lng1],[lat2,lng2]]}
function center(b){const bd=bounds(b);return [(bd[0][0]+bd[1][0])/2,(bd[0][1]+bd[1][1])/2]}
function status(msg,t=2200){const el=$('status');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),t)}
function renderBlock(b){if(b.layer)map.removeLayer(b.layer);if(b.label)map.removeLayer(b.label);if(!b.visible)return;const bd=bounds(b);b.layer=L.rectangle(bd,{color:'#0f3763',weight:2,opacity:.95,fillColor:b.color,fillOpacity:.28}).addTo(map).bindPopup(`<b>${b.name}</b>`);if(showLabels&&map.getZoom()>=14){b.label=L.marker(center(b),{interactive:false,icon:L.divIcon({className:'',html:`<div class="label">${b.name}</div>`})}).addTo(map)}}
let showLabels=true,query='';
function renderAll(){blocks.forEach(renderBlock);buildList();$('subtitle').textContent=`${blocks.length} embedded block layers · no points/tree plots`}
function buildList(){const q=query.toLowerCase();$('blockList').innerHTML=blocks.filter(b=>!q||b.name.toLowerCase().includes(q)).map(b=>`<div class="block-row"><label class="check"><input type="checkbox" data-name="${b.name}" ${b.visible?'checked':''}><i class="swatch" style="background:${b.color}"></i><span>${b.name}</span></label><small>block</small></div>`).join('')||'<div class="hint">No matching layers.</div>';document.querySelectorAll('[data-name]').forEach(cb=>cb.onchange=()=>{const b=blocks.find(x=>x.name===cb.dataset.name);b.visible=cb.checked;renderBlock(b)})}
function fitMain(){const group=L.featureGroup(blocks.filter(b=>b.visible).map(b=>L.rectangle(bounds(b))));if(group.getBounds().isValid())map.fitBounds(group.getBounds().pad(.04),{maxZoom:17});else map.setView(DEFAULT_VIEW,17)}
$('panelBtn').onclick=()=>{$('panel').classList.toggle('collapsed');$('panelBtn').textContent=$('panel').classList.contains('collapsed')?'Open Layers':'Close Layers'};
$('fitBtn').onclick=fitMain;$('fitBtnTop').onclick=fitMain;
$('labelsBtn').onclick=()=>{showLabels=!showLabels;$('labelsBtn').classList.toggle('active',showLabels);renderAll()};
$('search').oninput=e=>{query=e.target.value.trim();buildList()};
$('satBtn').onclick=()=>{if(map.hasLayer(street))map.removeLayer(street);satellite.addTo(map);$('satBtn').classList.add('active');$('streetBtn').classList.remove('active')};
$('streetBtn').onclick=()=>{if(map.hasLayer(satellite))map.removeLayer(satellite);street.addTo(map);$('streetBtn').classList.add('active');$('satBtn').classList.remove('active')};
map.on('zoomend',renderAll);
renderAll();fitMain();status('Loaded embedded basic block map. No GeoJSON points/tree plots loaded.');
</script>
</body>
</html>
