<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>SGN Structures Map</title><link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'><style>html,body,#map{height:100%;margin:0;font-family:Arial}.panel{position:absolute;z-index:1000;top:12px;left:12px;background:white;padding:12px;border-radius:12px;box-shadow:0 3px 18px #0005;width:340px;max-height:90%;overflow:auto}.result{font-size:12px;border-bottom:1px solid #eee;padding:5px;cursor:pointer}input{width:100%;padding:8px}.popup td{border-bottom:1px solid #eee;padding:3px 5px;font-size:12px}.popup td:first-child{font-weight:bold}</style></head><body><div id='map'></div><div class='panel'><h2>SGN Structures Map</h2><p>Extracted polygons plus generated point markers.</p><input id='q' placeholder='Search'><p><label><input id='poly' type='checkbox' checked> polygons</label> <label><input id='pt' type='checkbox' checked> points</label> <button id='fit'>Fit</button></p><div id='count'></div><div id='results'></div></div><script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script><script>const map=L.map('map').setView([36.7,-119.7],14);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:22,attribution:'&copy; OpenStreetMap'}).addTo(map);function esc(x){return String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function pop(p){let ks=Object.keys(p).filter(k=>p[k]!=null&&p[k]!==''&&!k.startsWith('Shape_')).slice(0,24);return '<div class=popup><table>'+ks.map(k=>`<tr><td>${esc(k)}</td><td>${esc(p[k])}</td></tr>`).join('')+'</table></div>'}function on(f,l){l.bindPopup(pop(f.properties||{}))}const polys=L.geoJSON(null,{style:{weight:2,fillOpacity:.25},onEachFeature:on});const pts=L.geoJSON(null,{pointToLayer:(f,ll)=>L.circleMarker(ll,{radius:6,weight:2,fillOpacity:.9}),onEachFeature:on});let pointData=[];function label(f){let p=f.properties||{};return p.label||p.Name||p.name||p._layer||'feature'}function refresh(){let q=document.getElementById('q').value.toLowerCase();let m=pointData.filter(f=>!q||JSON.stringify(f.properties||{}).toLowerCase().includes(q)).slice(0,100);document.getElementById('count').textContent=`${pointData.length} generated points / ${m.length} shown`;document.getElementById('results').innerHTML=m.map((f,i)=>`<div class=result data-i=${i}><b>${esc(label(f))}</b><br>${esc((f.properties||{})._layer||'')}</div>`).join('');[...document.querySelectorAll('.result')].forEach((e,i)=>e.onclick=()=>{let f=m[i],c=f.geometry.coordinates;map.setView([c[1],c[0]],19);L.popup().setLatLng([c[1],c[0]]).setContent(pop(f.properties||{})).openOn(map)})}Promise.all([fetch('data/structures_polygons.geojson').then(r=>r.json()),fetch('data/structures_points.geojson').then(r=>r.json())]).then(([a,b])=>{polys.addData(a).addTo(map);pts.addData(b).addTo(map);pointData=b.features||[];let bd=polys.getBounds();if(bd.isValid())map.fitBounds(bd.pad(.15));refresh()});q.oninput=refresh;poly.onchange=e=>e.target.checked?polys.addTo(map):map.removeLayer(polys);pt.onchange=e=>e.target.checked?pts.addTo(map):map.removeLayer(pts);fit.onclick=()=>{let b=polys.getBounds();if(b.isValid())map.fitBounds(b.pad(.15))}</script></body></html>
