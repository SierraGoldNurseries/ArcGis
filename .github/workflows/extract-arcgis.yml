name: Auto-build ArcGIS Map Data

on:
  push:
    paths:
      - 'data/raw/**'
      - 'tools/extract_project.py'
      - '.github/workflows/extract-arcgis.yml'
  repository_dispatch:
    types: [arcgis_upload]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: arcgis-map-build
  cancel-in-progress: true

jobs:
  build-map-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # ✅ FIXED: moved inside job

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch || github.ref }}

      - name: Install GIS libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install geopandas shapely fiona pyproj

      - name: Run extractor
        run: |
          python tools/extract_project.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/optimized || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-build optimized GeoJSON"
          git push
