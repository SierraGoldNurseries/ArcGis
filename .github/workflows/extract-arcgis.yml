name: Auto-build ArcGIS Map Data

on:
  push:
    paths:
      - 'data/raw/**'
      - 'tools/extract_project.py'
      - '.github/workflows/extract-arcgis.yml'
  repository_dispatch:
    types: [arcgis_upload]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: arcgis-map-build
  cancel-in-progress: true

jobs:
  build-map-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch || github.ref }}
          lfs: true

      - name: Pull Git LFS files
        run: |
          git lfs install
          git lfs pull

      - name: Install GIS libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin p7zip-full
          ogrinfo --version

      - name: Verify raw ArcGIS packages are real files
        run: |
          bad=0
          for f in data/raw/*.ppkx data/raw/*.mpkx; do
            [ -e "$f" ] || continue
            size=$(wc -c < "$f")
            if [ "$size" -lt 1000 ] && grep -q "git-lfs.github.com/spec" "$f" 2>/dev/null; then
              echo "ERROR: $f is still a Git LFS pointer, not the real ArcGIS package."
              bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            echo "Git LFS files were not downloaded. Check repository Git LFS setup or re-upload the real .ppkx/.mpkx files."
            exit 1
          fi

      - name: Build combined polygons and points from every project in data/raw
        run: |
          if [ -z "$(find data/raw -mindepth 1 -maxdepth 1 ! -name '.gitkeep' 2>/dev/null)" ]; then
            echo "No files in data/raw. Nothing to extract."
            exit 0
          fi
          python3 tools/extract_project.py

      - name: Commit rebuilt map data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/combined_polygons.geojson data/combined_points.geojson data/structures_polygons.geojson data/structures_points.geojson data/map_config.json data/project_manifest.json data/layer_inventory.csv data/layers/ || true
          if git diff --cached --quiet; then
            echo "No generated map-data changes to commit."
          else
            git commit -m "Auto-build combined ArcGIS map data"
            git push
          fi
