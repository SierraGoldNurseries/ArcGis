name: Auto-build ArcGIS Map Data

on:
  push:
    paths:
      - 'data/raw/**'
      - 'tools/extract_project.py'
      - '.github/workflows/extract-arcgis.yml'
  repository_dispatch:
    types: [arcgis_upload]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-map-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: false
          ref: ${{ github.event.client_payload.branch || github.ref }}

      - name: Install GIS libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv p7zip-full gdal-bin

      - name: Ignore Git LFS pointer packages
        run: |
          set -euo pipefail

          skipped=0

          for f in data/raw/*.ppkx data/raw/*.mpkx; do
            [ -e "$f" ] || continue

            if head -c 300 "$f" | grep -q "git-lfs.github.com/spec"; then
              echo "Warning: $f is only a Git LFS pointer. Skipping it."
              rm -f "$f"
              skipped=$((skipped + 1))
            fi
          done

          echo "Skipped $skipped Git LFS pointer package(s)."

      - name: Build map data
        run: |
          set -euo pipefail
          python tools/extract_project.py

      - name: Verify generated files exist
        run: |
          set -euo pipefail

          echo "Checking required generated files..."

          test -f data/structures_polygons.geojson
          test -f data/structures_points.geojson
          test -f data/combined_polygons.geojson
          test -f data/combined_points.geojson
          test -f data/layer_inventory.csv
          test -f data/map_config.json
          test -f data/project_manifest.json

          echo "Generated files found:"
          ls -lh data/structures_polygons.geojson
          ls -lh data/structures_points.geojson
          ls -lh data/combined_polygons.geojson
          ls -lh data/combined_points.geojson
          ls -lh data/layer_inventory.csv
          ls -lh data/map_config.json
          ls -lh data/project_manifest.json

      - name: Commit rebuilt map data
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Force-add generated files in case .gitignore is blocking GeoJSON/CSV/JSON.
          git add -A data
          git add -f data/*.geojson data/*.csv data/*.json || true
          git add -f data/layers/*.geojson || true

          echo "Git status after add:"
          git status --short

          if git diff --cached --quiet; then
            echo "No rebuilt map data changes to commit."
          else
            git commit -m "Auto-build combined ArcGIS map data"
            git push
          fi
