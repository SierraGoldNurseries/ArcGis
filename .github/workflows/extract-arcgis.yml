name: Build SGN Map Data

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: sgn-map-data-build
  cancel-in-progress: false

jobs:
  build-map-data:
    name: Extract ArcGIS PPKX files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Git LFS
        run: |
          git lfs install
          git lfs track "data/map/**/*.geojson"
          git lfs track "data/map/*.geojson"
          git add .gitattributes || true

      - name: Show repo files
        run: |
          echo "Current folder:"
          pwd
          echo "Raw project files:"
          find data/raw -maxdepth 1 -type f -print || true
          echo "Extractor:"
          ls -la tools || true

      - name: Install GIS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin python3-gdal p7zip-full

      - name: Verify GDAL
        run: |
          python3 - <<'PY'
          from osgeo import gdal, ogr
          print("GDAL version:", gdal.VersionInfo())
          print("OpenFileGDB driver:", bool(ogr.GetDriverByName("OpenFileGDB")))
          print("FileGDB driver:", bool(ogr.GetDriverByName("FileGDB")))
          PY

      - name: Run SGN ArcGIS extractor
        run: |
          python3 tools/extract_project.py

      - name: List generated map data
        run: |
          echo "Generated data/map files:"
          find data/map -maxdepth 4 -type f -print | sort || true
          echo "File sizes:"
          du -h data/map/**/* 2>/dev/null || true

      - name: Commit generated map data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .gitattributes || true
          git add data/map || true

          # remove old giant compatibility files if they still exist
          git rm -f data/structures_points.geojson data/structures_polygons.geojson 2>/dev/null || true
          git rm -f data/map/combined_points.geojson data/map/combined_polygons.geojson data/map/combined_lines.geojson 2>/dev/null || true
          git rm -f data/map/structures_points.geojson data/map/structures_polygons.geojson 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No generated map data changes to commit."
            exit 0
          fi

          git commit -m "Build split SGN map data"

          echo "Pulling latest main before push..."
          git pull --rebase origin main

          echo "Pushing generated split map data..."
          git push origin HEAD:main
